            {activeVotes.map(v => <VotacionCard key={v._docId || v.id} voto={v} residents={residents} onSelect={() => setSelected(v)} onDelete={handleDelete} confirmDel={confirmDelVoto} setConfirmDel={setConfirmDelVoto} onSendWA={() => handleSendWA(v)} sendingWA={sendingWA === (v._docId||v.id)} sendResult={sendResult?.id === (v._docId||v.id) ? sendResult : null} mob={mob} />)}
          </div>
        </div>
      )}

      {/* Cerradas */}
      {closedVotes.length > 0 && (
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>🔒 Votaciones Cerradas</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {closedVotes.map(v => <VotacionCard key={v._docId || v.id} voto={v} residents={residents} onSelect={() => setSelected(v)} onDelete={handleDelete} confirmDel={confirmDelVoto} setConfirmDel={setConfirmDelVoto} mob={mob} />)}
          </div>
        </div>
      )}

      {votes.length === 0 && (
        <div style={{ background: "#fff", borderRadius: 10, padding: 48, textAlign: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🗳️</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 6 }}>Sin votaciones aún</div>
          <div style={{ color: "#64748b", fontSize: 13, marginBottom: 20 }}>Crea tu primera votación para consultar a los residentes</div>
          <button onClick={() => setShowNew(true)} style={btnPri(mob)}>Crear votación</button>
        </div>
      )}

      {showNew && <NuevaVotacionModal onClose={() => setShowNew(false)} onSave={handleCreate} mob={mob} />}
    </div>
  );
}

function VotacionCard({ voto, residents, onSelect, onDelete, confirmDel, setConfirmDel, onSendWA, sendingWA, sendResult, mob }) {
  const totalApts   = residents.filter(r => r.estado === "activo").length || 46;
  const totalVotos  = (voto.respuestas || []).length;
  const pct         = totalApts > 0 ? Math.round((totalVotos / totalApts) * 100) : 0;
  const activa      = voto.estado === "activa";

  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: mob ? 16 : 20, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${activa ? "#059669" : "#9ca3af"}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <span style={{ background: activa ? "#f0fdf4" : "#f9fafb", color: activa ? "#059669" : "#9ca3af", border: `1px solid ${activa ? "#059669" : "#9ca3af"}55`, borderRadius: 20, padding: "2px 10px", fontSize: 10, fontWeight: 700 }}>{activa ? "Activa" : "Cerrada"}</span>
            <span style={{ color: "#64748b", fontSize: 11 }}>{voto.tipo === "binaria" ? "✅ Sí / No" : voto.tipo === "multiple" ? "📋 Opción múltiple" : "⭐ Calificación"}</span>
          </div>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>{voto.titulo}</div>
          {voto.descripcion && <div style={{ fontSize: 12, color: "#475569", marginBottom: 8 }}>{voto.descripcion}</div>}
          <div style={{ fontSize: 11, color: "#64748b" }}>📅 {voto.fechaInicio} → {voto.fechaFin || "Sin fecha límite"} · Por {voto.creadoPor}</div>
        </div>
        <div style={{ textAlign: "center", flexShrink: 0 }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#0f172a" }}>{totalVotos}</div>
          <div style={{ fontSize: 10, color: "#64748b" }}>votos</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: pct >= 50 ? "#059669" : "#d97706", marginTop: 2 }}>{pct}%</div>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{ height: 5, background: "#f1f0ec", borderRadius: 4, marginTop: 12, marginBottom: 12 }}>
        <div style={{ height: "100%", width: `${pct}%`, background: activa ? "#059669" : "#9ca3af", borderRadius: 4, transition: "width 0.4s" }} />
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onSelect} style={{ ...btnPri(mob), flex: 1, textAlign: "center" }}>Ver resultados →</button>
        {activa && voto._docId && (
          <button onClick={onSendWA} disabled={sendingWA} style={{ background: sendResult?.ok ? "#f0fdf4" : "#f0f9ff", color: sendResult?.ok ? "#059669" : "#0284c7", border: `1px solid ${sendResult?.ok ? "#059669" : "#0284c7"}55`, borderRadius: 8, padding: "8px 12px", fontSize: 11, cursor: sendingWA ? "not-allowed" : "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 600, flexShrink: 0 }}>
            {sendingWA ? "Enviando..." : sendResult?.ok ? `✅ Enviado (${sendResult.enviados})` : "📤 WhatsApp"}
          </button>
        )}
        {confirmDel === (voto._docId || voto.id)
          ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "#dc2626", fontWeight: 600 }}>¿Eliminar?</span>
              <button onClick={() => onDelete(voto)} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
              <button onClick={() => setConfirmDel(null)} style={{ background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
            </div>
          : <button onClick={() => setConfirmDel(voto._docId || voto.id)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "8px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
        }
      </div>
    </div>
  );
}

function VotacionDetail({ voto, residents, onBack, onClose, onDelete, setVotes, user, mob }) {
  const [showVotar, setShowVotar] = useState(false);
  const [confirmBorrar, setConfirmBorrar] = useState(null); // apt del voto a borrar
  const activa = voto.estado === "activa";
  const respuestas = voto.respuestas || [];

  const handleBorrarVoto = async (aptToBorrar) => {
    const nuevasResp = respuestas.filter(r => r.apt !== aptToBorrar);
    const id = voto._docId || voto.id;
    setVotes(p => p.map(v => (v._docId || v.id) === id ? { ...v, respuestas: nuevasResp } : v));
    if (voto._docId) await fbSetField('votes', voto._docId, { respuestas: nuevasResp });
    setConfirmBorrar(null);
  };
  const totalApts  = residents.filter(r => r.estado === "activo").length || 46;

  // Calcular resultados
  const resultados = (() => {
    if (voto.tipo === "binaria") {
      const si  = respuestas.filter(r => r.voto === "si").length;
      const no  = respuestas.filter(r => r.voto === "no").length;
      const abs = respuestas.filter(r => r.voto === "abstencion").length;
      return [{ label: "✅ Sí", count: si, color: "#059669" }, { label: "❌ No", count: no, color: "#dc2626" }, { label: "➖ Abstención", count: abs, color: "#9ca3af" }];
    }
    if (voto.tipo === "multiple") {
      return (voto.opciones || []).map((op, i) => ({
        label: op, count: respuestas.filter(r => r.voto === i.toString()).length,
        color: ["#2563eb","#059669","#d97706","#7c3aed","#0891b2"][i % 5]
      }));
    }
    if (voto.tipo === "calificacion") {
      const vals = respuestas.map(r => parseInt(r.voto)).filter(n => !isNaN(n));
      const avg  = vals.length ? (vals.reduce((a,b) => a+b,0) / vals.length).toFixed(1) : "—";
      return [1,2,3,4,5].map(n => ({ label: "★".repeat(n), count: vals.filter(v => v === n).length, color: "#d97706", avg }));
    }
    return [];
  })();

  const maxCount = Math.max(...resultados.map(r => r.count), 1);
  const totalVotos = respuestas.length;
  const pct = Math.round((totalVotos / totalApts) * 100);

  const handleVotar = (votoVal) => {
    const nuevaResp = { apt: user.apt || "Admin", nombre: user.name, voto: votoVal, fecha: new Date().toISOString().slice(0,10) };
    setVotes(p => p.map(v => {
      const id = voto._docId || voto.id;
      if ((v._docId || v.id) === id) return { ...v, respuestas: [...(v.respuestas || []).filter(r => r.apt !== nuevaResp.apt), nuevaResp] };
      return v;
    }));
    setShowVotar(false);
  };

  return (
    <div>
      <button onClick={onBack} style={{ background: "transparent", border: "none", color: "#64748b", cursor: "pointer", fontSize: 13, marginBottom: 16, fontFamily: "'Inter',sans-serif" }}>← Volver</button>

      <div style={{ background: "#fff", borderRadius: 10, padding: mob ? 18 : 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <span style={{ background: activa ? "#f0fdf4" : "#f9fafb", color: activa ? "#059669" : "#9ca3af", border: `1px solid ${activa ? "#059669" : "#9ca3af"}55`, borderRadius: 20, padding: "3px 12px", fontSize: 11, fontWeight: 700 }}>{activa ? "● Activa" : "🔒 Cerrada"}</span>
            </div>
            <div style={{ fontWeight: 700, fontSize: mob ? 18 : 22, marginBottom: 6 }}>{voto.titulo}</div>
            {voto.descripcion && <div style={{ fontSize: 13, color: "#475569", marginBottom: 8, lineHeight: 1.6 }}>{voto.descripcion}</div>}
            <div style={{ fontSize: 11, color: "#64748b" }}>📅 {voto.fechaInicio} — {voto.fechaFin || "Sin fecha límite"} · Creado por {voto.creadoPor}</div>
          </div>
          <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
            {activa && <button onClick={() => setShowVotar(true)} style={btnPri(mob)}>🗳️ Registrar voto</button>}
            {activa && <button onClick={onClose} style={{ background: "#f8fafc", color: "#d97706", border: "1px solid #d9770633", borderRadius: 8, padding: "9px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🔒 Cerrar</button>}
            <button onClick={onDelete} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "9px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
          </div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        {/* Resultados */}
        <div style={{ background: "#fff", borderRadius: 10, padding: mob ? 18 : 22, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 16 }}>Resultados</div>
          {voto.tipo === "calificacion" && resultados[0]?.avg && (
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 42, fontWeight: 700, color: "#d97706" }}>{resultados[0].avg}</div>
              <div style={{ color: "#d97706", fontSize: 20 }}>{"★".repeat(Math.round(parseFloat(resultados[0].avg || 0)))}{"☆".repeat(5 - Math.round(parseFloat(resultados[0].avg || 0)))}</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>Calificación promedio</div>
            </div>
          )}
          {resultados.map((r, i) => (
            <div key={i} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                <span style={{ fontWeight: 600 }}>{r.label}</span>
                <span style={{ color: r.color, fontWeight: 700 }}>{r.count} {totalVotos > 0 ? `(${Math.round(r.count/totalVotos*100)}%)` : ""}</span>
              </div>
              <div style={{ height: 8, background: "#f1f0ec", borderRadius: 4 }}>
                <div style={{ height: "100%", width: `${maxCount > 0 ? (r.count / maxCount) * 100 : 0}%`, background: r.color, borderRadius: 4, transition: "width 0.4s" }} />
              </div>
            </div>
          ))}
          <div style={{ borderTop: "1px solid #f1f5f9", paddingTop: 12, marginTop: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
              <span style={{ color: "#64748b" }}>Participación</span>
              <span style={{ fontWeight: 700, color: pct >= 50 ? "#059669" : "#d97706" }}>{totalVotos} / {totalApts} apts ({pct}%)</span>
            </div>
            <div style={{ height: 6, background: "#f1f0ec", borderRadius: 4, marginTop: 6 }}>
              <div style={{ height: "100%", width: `${pct}%`, background: pct >= 50 ? "#059669" : "#d97706", borderRadius: 4 }} />
            </div>
            <div style={{ fontSize: 11, color: pct >= 50 ? "#059669" : "#d97706", marginTop: 4, fontWeight: 600 }}>
              {pct >= 50 ? "✅ Quórum alcanzado (≥50%)" : `⚠️ Se necesita ${Math.ceil(totalApts * 0.5) - totalVotos} voto${Math.ceil(totalApts * 0.5) - totalVotos !== 1 ? "s" : ""} más para quórum`}
            </div>
          </div>
        </div>

        {/* Lista de votos */}
        <div style={{ background: "#fff", borderRadius: 10, padding: mob ? 18 : 22, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 16 }}>Registro de votos ({respuestas.length})</div>
          <div style={{ maxHeight: 320, overflowY: "auto" }}>
            {respuestas.length === 0
              ? <div style={{ color: "#64748b", fontSize: 13, textAlign: "center", padding: 24 }}>Aún no hay votos registrados</div>
              : respuestas.map((r, i) => {
                  const resLabel = voto.tipo === "binaria"
                    ? r.voto === "si" ? "✅ Sí" : r.voto === "no" ? "❌ No" : "➖ Abstención"
                    : voto.tipo === "multiple"
                    ? (voto.opciones || [])[parseInt(r.voto)] || r.voto
                    : "★".repeat(parseInt(r.voto) || 0);
                  return (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #f0f4f8" }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 13 }}>Apto {r.apt}</div>
                        <div style={{ fontSize: 11, color: "#64748b" }}>{r.nombre} · {r.fecha}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontWeight: 700, fontSize: 13, color: "#0f172a" }}>{resLabel}</span>
                        {confirmBorrar === r.apt ? (
                          <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                            <span style={{ fontSize: 11, color: "#dc2626" }}>¿Borrar?</span>
                            <button onClick={() => handleBorrarVoto(r.apt)} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 6, padding: "3px 8px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
                            <button onClick={() => setConfirmBorrar(null)} style={{ background: "#f3f4f6", color: "#6b7280", border: "none", borderRadius: 6, padding: "3px 8px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
                          </div>
                        ) : (
                          <button onClick={() => setConfirmBorrar(r.apt)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 6, padding: "3px 8px", fontSize: 13, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
                        )}
                      </div>
                    </div>
                  );
                })
            }
          </div>
        </div>
      </div>

      {/* Modal votar */}
      {showVotar && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 14, padding: 28, maxWidth: 440, width: "100%", boxShadow: "0 24px 60px rgba(0,0,0,0.25)" }}>
            <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>🗳️ Registrar voto</div>
            <div style={{ fontSize: 13, color: "#475569", marginBottom: 20 }}>{voto.titulo}</div>
            {voto.tipo === "binaria" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[{v:"si",l:"✅ Sí, a favor",c:"#059669"},{v:"no",l:"❌ No, en contra",c:"#dc2626"},{v:"abstencion",l:"➖ Me abstengo",c:"#9ca3af"}].map(opt => (
                  <button key={opt.v} onClick={() => handleVotar(opt.v)} style={{ background: opt.c + "18", color: opt.c, border: `2px solid ${opt.c}44`, borderRadius: 9, padding: "14px", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>{opt.l}</button>
                ))}
              </div>
            )}
            {voto.tipo === "multiple" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {(voto.opciones || []).map((op, i) => (
                  <button key={i} onClick={() => handleVotar(i.toString())} style={{ background: "#f0f4f8", border: "2px solid #e2e8f0", borderRadius: 9, padding: "13px", fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "'Inter',sans-serif", textAlign: "left" }}>{op}</button>
                ))}
              </div>
            )}
            {voto.tipo === "calificacion" && (
              <div>
                <div style={{ fontSize: 13, color: "#64748b", marginBottom: 12 }}>Selecciona una calificación del 1 al 5:</div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                  {[1,2,3,4,5].map(n => (
                    <button key={n} onClick={() => handleVotar(n.toString())} style={{ background: "#f0f4f8", border: "2px solid #e2e8f0", borderRadius: 9, width: 52, height: 52, fontSize: 22, cursor: "pointer", fontFamily: "'Inter',sans-serif", display: "flex", alignItems: "center", justifyContent: "center" }}>{"★".repeat(n)}</button>
                  ))}
                </div>
              </div>
            )}
            <button onClick={() => setShowVotar(false)} style={{ ...btnSec(mob), width: "100%", marginTop: 16, textAlign: "center" }}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

function NuevaVotacionModal({ onClose, onSave, mob }) {
  const [form, setForm] = useState({
    titulo: "", descripcion: "", tipo: "binaria",
    fechaInicio: new Date().toISOString().slice(0,10), fechaFin: "",
    opciones: ["", ""]
  });
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16, overflowY: "auto" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: mob ? 20 : 28, width: "100%", maxWidth: 540, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 24px 60px rgba(0,0,0,0.25)", margin: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 18 }}>🗳️ Nueva Votación</div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 20, cursor: "pointer", color: "#64748b" }}>✕</button>
        </div>

        <FInp label="Título de la votación *" editing value={form.titulo} onChange={v => f("titulo", v)} placeholder="Ej: Aprobación presupuesto 2026" />
        <FTxt label="Descripción / Contexto" editing value={form.descripcion} onChange={v => f("descripcion", v)} placeholder="Explica el contexto o propósito de esta votación..." />

        <div style={{ marginBottom: 16 }}>
          <label style={lblStyle}>Tipo de votación</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[{id:"binaria",label:"✅ Sí / No",desc:"Aprobación simple"},{id:"multiple",label:"📋 Múltiple",desc:"Varias opciones"},{id:"calificacion",label:"⭐ Calificación",desc:"Del 1 al 5"}].map(t => {
              const act = form.tipo === t.id;
              return (
                <button key={t.id} onClick={() => f("tipo", t.id)} style={{ flex: 1, minWidth: 120, background: act ? "#0d1b2a22" : "#f0f4f8", color: act ? "#0d1b2a" : "#64748b", border: `2px solid ${act ? "#0d1b2a" : "#e2e8f0"}`, borderRadius: 9, padding: "10px 8px", cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: act ? 700 : 400, fontSize: 12, transition: "all 0.12s" }}>
                  <div style={{ fontWeight: 700 }}>{t.label}</div>
                  <div style={{ fontSize: 10, marginTop: 2, opacity: 0.7 }}>{t.desc}</div>
                </button>
              );
            })}
          </div>
        </div>

        {form.tipo === "multiple" && (
          <div style={{ marginBottom: 16 }}>
            <label style={lblStyle}>Opciones de respuesta</label>
            {form.opciones.map((op, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input value={op} onChange={e => { const ops = [...form.opciones]; ops[i] = e.target.value; f("opciones", ops); }} placeholder={`Opción ${i+1}`} style={{ ...inpStyle, flex: 1, marginBottom: 0 }} />
                {form.opciones.length > 2 && <button onClick={() => f("opciones", form.opciones.filter((_,j) => j !== i))} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "0 12px", cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>✕</button>}
              </div>
            ))}
            {form.opciones.length < 6 && <button onClick={() => f("opciones", [...form.opciones, ""])} style={{ ...btnSec(mob), fontSize: 12 }}>+ Agregar opción</button>}
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <FInp label="Fecha inicio" editing value={form.fechaInicio} onChange={v => f("fechaInicio", v)} type="date" />
          <FInp label="Fecha límite" editing value={form.fechaFin}    onChange={v => f("fechaFin", v)}    type="date" />
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={btnSec(mob)}>Cancelar</button>
          <button onClick={() => {
            if (!form.titulo) { alert("El título es obligatorio"); return; }
            if (form.tipo === "multiple" && form.opciones.filter(o => o.trim()).length < 2) { alert("Agrega al menos 2 opciones"); return; }
            onSave({ ...form, opciones: form.tipo === "multiple" ? form.opciones.filter(o => o.trim()) : [] });
          }} style={btnPri(mob)}>✅ Crear votación</button>
        </div>
      </div>
    </div>
  );
}

/* ─── RESIDENTE PERFIL (Admin) ─── */
function ResidentePerfil({ resident, comprobantes, setComprobantes, reports, onBack, mob }) {
  const ESTADOS_COMP = [
    { id: "pendiente",   label: "Pendiente",   color: "#d97706", bg: "#fefce8", icon: "⏳" },
    { id: "verificado",  label: "Verificado",  color: "#059669", bg: "#f0fdf4", icon: "✅" },
    { id: "rechazado",   label: "Rechazado",   color: "#dc2626", bg: "#fef2f2", icon: "❌" },
  ];
  const estComp = (id) => ESTADOS_COMP.find(e => e.id === id) || ESTADOS_COMP[0];
  const [notaModal, setNotaModal]   = useState(null);
  const [notaText, setNotaText]     = useState("");
  const [updatingId, setUpdatingId] = useState(null);
  const [viewImg, setViewImg]       = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  const handleEstado = async (comp, nuevoEstado) => {
    const uid = (comp._docId || comp.id) + nuevoEstado;
    setUpdatingId(uid);
    if (comp._docId) {
      await fbSetField('comprobantes', comp._docId, { estado: nuevoEstado });
    } else {
      setComprobantes(p => p.map(c => (c._docId || c.id) === (comp._docId || comp.id) ? { ...c, estado: nuevoEstado } : c));
    }
    setUpdatingId(null);
  };
  const handleNota = async (comp) => {
    if (comp._docId) {
      await fbSetField('comprobantes', comp._docId, { notaAdmin: notaText });
    } else {
      setComprobantes(p => p.map(c => (c._docId || c.id) === (comp._docId || comp.id) ? { ...c, notaAdmin: notaText } : c));
    }
    setNotaModal(null);
  };
  const handleDelete = async (comp) => {
    if (comp._docId && window.__db) {
      const { doc, deleteDoc } = window.__fs;
      await deleteDoc(doc(window.__db, 'comprobantes', comp._docId));
    }
    setComprobantes(p => p.filter(c => (c._docId || c.id) !== (comp._docId || comp.id)));
    setConfirmDel(null);
  };

  const sorted = [...comprobantes].sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));
  const pendientes = comprobantes.filter(c => c.estado === "pendiente").length;
  const verificados = comprobantes.filter(c => c.estado === "verificado").length;

  return (
    <div>
      <button onClick={onBack} style={{ background: "transparent", border: "none", color: "#64748b", cursor: "pointer", fontSize: 13, marginBottom: 16, fontFamily: "'Inter',sans-serif" }}>← Volver a residentes</button>

      {/* Header del residente */}
      <div style={{ background: "linear-gradient(135deg, #0d1b2a, #1e3a5f)", borderRadius: 14, padding: mob ? 18 : 24, marginBottom: 20, color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: "#64748b", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Apto {resident.apt} · Piso {resident.piso || "—"}</div>
            <div style={{ fontSize: mob ? 20 : 24, fontWeight: 700, color: "#f97316" }}>{resident.nombre}</div>
            <div style={{ fontSize: 12, color: "#f97316", marginTop: 4 }}>{resident.tipo === "propietario" ? "🏠 Propietario" : resident.tipo === "arrendatario" ? "🔑 Arrendatario" : "👨‍👩‍👧 Familiar"} · {resident.estado === "activo" ? "✅ Activo" : "⏸️ Inactivo"}</div>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            {resident.telefono && <a href={`https://wa.me/${resident.telefono.replace(/\D/g,"")}`} target="_blank" style={{ background: "#25D366", color: "#fff", borderRadius: 8, padding: "8px 14px", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>📱 WhatsApp</a>}
            {resident.email && <a href={`mailto:${resident.email}`} style={{ background: "#2563eb", color: "#fff", borderRadius: 8, padding: "8px 14px", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>✉️ Email</a>}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginTop: 18 }}>
          {[
            { label: "Teléfono",    value: resident.telefono  || "—" },
            { label: "Email",       value: resident.email     || "—" },
            { label: "Vehículo",    value: resident.vehiculo  ? `${resident.vehiculo} · ${resident.placa || ""}` : "—" },
            { label: "Parqueadero", value: resident.parqueadero || "—" },
          ].map(d => (
            <div key={d.label} style={{ background: "rgba(255,255,255,0.07)", borderRadius: 8, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8 }}>{d.label}</div>
              <div style={{ fontSize: 12, color: "#fff", marginTop: 3 }}>{d.value}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Datos del Propietario — solo si es arrendatario */}
      {resident.tipo === "arrendatario" && (resident.propietario || resident.contacto) && (
        <div style={{ background: "#fff", borderRadius: 14, padding: mob ? 16 : 20, marginBottom: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: "4px solid #d97706" }}>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#d97706", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 14 }}>🏠 Datos del Propietario</div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 12 }}>
            {[
              { label: "Propietario / Razón Social", value: resident.propietario || "—" },
              { label: "Persona de Contacto",        value: resident.contacto    || "—" },
              { label: "Teléfono",                   value: resident.telefonoProp || "—" },
              { label: "Email",                      value: resident.emailProp   || "—" },
            ].map(d => (
              <div key={d.label} style={{ background: "#fefce8", borderRadius: 8, padding: "10px 14px" }}>
                <div style={{ fontSize: 10, color: "#92400e", textTransform: "uppercase", letterSpacing: 0.8 }}>{d.label}</div>
                <div style={{ fontSize: 13, color: "#1e293b", marginTop: 3, fontWeight: 500 }}>{d.value}</div>
              </div>
            ))}
          </div>
          {resident.telefonoProp && (
            <div style={{ marginTop: 12, display: "flex", gap: 10 }}>
              <a href={`https://wa.me/${resident.telefonoProp.replace(/\D/g,"")}`} target="_blank" style={{ background: "#25D366", color: "#fff", borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>📱 WhatsApp Propietario</a>
              {resident.emailProp && <a href={`mailto:${resident.emailProp}`} style={{ background: "#2563eb", color: "#fff", borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>✉️ Email Propietario</a>}
            </div>
          )}
        </div>
      )}

      {/* Stats comprobantes */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total comprobantes", value: comprobantes.length, icon: "💳", color: "#0f172a" },
          { label: "Pendientes revisión", value: pendientes,          icon: "⏳", color: "#d97706" },
          { label: "Verificados",         value: verificados,         icon: "✅", color: "#059669" },
        ].map(s => (
          <div key={s.label} style={{ background: "#fff", borderRadius: 10, padding: "16px 18px", borderLeft: `3px solid ${s.color}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: 20 }}>{s.icon}</div>
            <div style={{ fontSize: mob ? 22 : 26, fontWeight: 700, color: s.color, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        {/* Comprobantes */}
        <div>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>💳 Historial de Comprobantes</div>
          {sorted.length === 0
            ? <div style={{ background: "#fff", borderRadius: 10, padding: 32, textAlign: "center", color: "#64748b", fontSize: 13, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>Sin comprobantes enviados</div>
            : sorted.map(comp => {
                const e = estComp(comp.estado);
                return (
                  <div key={comp._docId || comp.id} style={{ background: "#fff", borderRadius: 10, padding: 16, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${e.color}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{comp.concepto}</div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>📅 {comp.mes} · {comp.banco}</div>
                        <div style={{ fontSize: 12, color: "#475569", marginTop: 2 }}>{comp.fecha}</div>
                      </div>
                      <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}44`, borderRadius: 20, padding: "3px 10px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{e.icon} {e.label}</span>
                    </div>
                    {comp.imagen && (
                      <img src={comp.imagen} alt="comprobante" style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 8, marginTop: 10, cursor: "zoom-in" }} onClick={() => setViewImg(comp.imagen)} />
                    )}
                    {comp.notaAdmin && <div style={{ background: "#f8fafc", borderRadius: 8, padding: "8px 10px", marginTop: 8, fontSize: 11, color: "#475569" }}>📝 {comp.notaAdmin}</div>}
                    {/* Acciones admin */}
                    <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                      {["pendiente","verificado","rechazado"].map(est => {
                        const ee = estComp(est);
                        const active = comp.estado === est;
                        const loading = updatingId === (comp._docId || comp.id) + est;
                        return (
                          <button key={est} disabled={loading || updatingId !== null} onClick={() => handleEstado(comp, est)}
                            style={{ background: active ? ee.color : ee.bg, color: active ? "#fff" : ee.color, border: `2px solid ${active ? ee.color : ee.color + "44"}`, borderRadius: 8, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: loading ? "wait" : "pointer", fontFamily: "'Inter',sans-serif", opacity: (updatingId !== null && !loading) ? 0.5 : 1, transition: "all 0.15s" }}>
                            {loading ? "⏳" : ee.icon} {loading ? "Guardando..." : ee.label}
                          </button>
                        );
                      })}
                      <button onClick={() => { setNotaModal(comp); setNotaText(comp.notaAdmin || ""); }} style={{ background: "#f0f4f8", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", color: "#475569", fontFamily: "'Inter',sans-serif" }}>📝 Nota</button>
                      {confirmDel === (comp._docId || comp.id)
                        ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                            <span style={{ fontSize: 11, color: "#dc2626", fontWeight: 600 }}>¿Eliminar?</span>
                            <button onClick={() => handleDelete(comp)} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
                            <button onClick={() => setConfirmDel(null)} style={{ background: "#f3f4f6", color: "#6b7280", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
                          </div>
                        : <button onClick={() => setConfirmDel(comp._docId || comp.id)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️ Eliminar</button>
                      }
                    </div>
                  </div>
                );
              })
          }
        </div>

        {/* Reportes del residente */}
        <div>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>📋 Reportes del Apto</div>
          {reports.length === 0
            ? <div style={{ background: "#fff", borderRadius: 10, padding: 32, textAlign: "center", color: "#64748b", fontSize: 13, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>Sin reportes</div>
            : reports.slice().reverse().map(r => {
                const s = sta(r.status);
                return (
                  <div key={r.id} style={{ background: "#fff", borderRadius: 10, padding: 14, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `3px solid ${s.color}` }}>
                    <div style={{ fontFamily: "monospace", fontSize: 10, color: "#64748b", marginBottom: 3 }}>{fmtTicket(r.ticketNum || r.id)}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{r.title}</div>
                      <Badge status={r.status} />
                    </div>
                    <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>📅 {fmtDateTime(r)} · {cat(r.category).label}</div>
                  </div>
                );
              })
          }
        </div>
      </div>

      {/* Modal nota admin */}
      {notaModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 14, padding: 28, maxWidth: 420, width: "100%", boxShadow: "0 24px 60px rgba(0,0,0,0.25)" }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>📝 Nota administrativa</div>
            <textarea value={notaText} onChange={e => setNotaText(e.target.value)} rows={4} placeholder="Escribe una nota para este comprobante..." style={{ ...inpStyle, width: "100%", resize: "vertical" }} />
            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              <button onClick={() => setNotaModal(null)} style={btnSec(mob)}>Cancelar</button>
              <button onClick={() => handleNota(notaModal)} style={btnPri(mob)}>Guardar nota</button>
            </div>
          </div>
        </div>
      )}
      <ImagenVisor src={viewImg} onClose={() => setViewImg(null)} />
    </div>
  );
}

/* ─── COMPROBANTES VIEW (Portal Residente) ─── */
/* ─── COMUNICADOS ─── */
const COMUNICADOS_BASE = [
  { id: 1, icon: "🚰", titulo: "Sin suministro de agua",     desc: "Racionar el uso de agua hasta nuevo aviso.",              categoria: "agua"       },
  { id: 2, icon: "💡", titulo: "Corte de electricidad",      desc: "Corte de electricidad programado. Favor tomar precauciones.", categoria: "electricidad" },
  { id: 3, icon: "🛗", titulo: "Ascensor fuera de servicio", desc: "El ascensor se encuentra fuera de servicio temporalmente.", categoria: "ascensor"   },
  { id: 4, icon: "🧹", titulo: "Fumigación programada",      desc: "Se realizará fumigación en áreas comunes del edificio.",  categoria: "fumigacion" },
  { id: 5, icon: "🏊", titulo: "Piscina cerrada",            desc: "La piscina está cerrada temporalmente por mantenimiento.", categoria: "piscina"    },
  { id: 6, icon: "📢", titulo: "Convocatoria a asamblea",    desc: "Se convoca a todos los residentes a asamblea general.",   categoria: "asamblea"   },
];

function ComunicadosView({ residents, mob }) {
  const [enviando, setEnviando]     = useState(null);
  const [resultados, setResultados] = useState({});
  const [historial, setHistorial]   = useState({});

  const handleEnviar = async (com) => {
    setEnviando(com.id);
    try {
      const res = await fetch("/dev/null", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ titulo: com.titulo, desc: com.desc, icon: com.icon, categoria: com.categoria })
      });
      const data = await res.json();
      setResultados(p => ({ ...p, [com.id]: { ok: data.ok, enviados: data.enviados, total: data.total } }));
      setHistorial(p => ({ ...p, [com.id]: new Date().toLocaleString("es-PA", { timeZone: "America/Panama", day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit", hour12: true }) }));
    } catch (e) {
      setResultados(p => ({ ...p, [com.id]: { ok: false, error: e.message } }));
    }
    setEnviando(null);
  };

  const catColors = { agua: "#0ea5e9", electricidad: "#f59e0b", ascensor: "#8b5cf6", fumigacion: "#10b981", piscina: "#06b6d4", asamblea: "#f97316" };

  return (
    <div>
      <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", marginBottom: 20, fontSize: 13, color: "#475569", borderLeft: "4px solid #f97316" }}>
        📌 Selecciona un comunicado y presiona <strong>Enviar a todos</strong> para enviarlo por WhatsApp a todos los residentes registrados.
        Cuando tengas los JPGs listos, se asignarán a cada comunicado automáticamente.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        {COMUNICADOS_BASE.map(com => {
          const color = catColors[com.categoria] || "#64748b";
          const res = resultados[com.id];
          const ult = historial[com.id];
          const isEnviando = enviando === com.id;
          return (
            <div key={com.id} style={{ background: "#fff", borderRadius: 14, padding: 20, boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderTop: `4px solid ${color}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <span style={{ fontSize: 32 }}>{com.icon}</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>{com.titulo}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{com.desc}</div>
                </div>
              </div>

              {/* Placeholder imagen */}
              <div style={{ background: "#f8fafc", border: "2px dashed #e2e8f0", borderRadius: 10, padding: "16px", textAlign: "center", marginBottom: 14, color: "#94a3b8", fontSize: 12 }}>
                🖼️ Imagen por asignar
              </div>

              {ult && (
                <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 10 }}>
                  Último envío: {ult}
                  {res?.enviados && <span> · {res.enviados} residentes</span>}
                </div>
              )}

              <button
                onClick={() => handleEnviar(com)}
                disabled={isEnviando}
                style={{ width: "100%", background: isEnviando ? "#94a3b8" : color, color: "#fff", border: "none", borderRadius: 10, padding: "12px", fontWeight: 700, fontSize: 14, cursor: isEnviando ? "not-allowed" : "pointer", fontFamily: "'Inter',sans-serif", transition: "opacity 0.2s" }}>
                {isEnviando ? "Enviando..." : res?.ok ? `✅ Enviado (${res.enviados} residentes)` : "📤 Enviar a todos"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}


/* ─── COMPROBANTES ADMIN ─── */
function ComprobantesAdmin({ comprobantes, setComprobantes, residents, mob }) {
  const ESTADOS = [
    { id: "pendiente",  label: "Pendiente",  color: "#d97706", bg: "#fefce8", icon: "⏳" },
    { id: "verificado", label: "Verificado", color: "#059669", bg: "#f0fdf4", icon: "✅" },
    { id: "rechazado",  label: "Rechazado",  color: "#dc2626", bg: "#fef2f2", icon: "❌" },
  ];
  const estComp = id => ESTADOS.find(e => e.id === id) || ESTADOS[0];

  const [filtroEstado, setFiltroEstado] = useState("todos");
  const [filtroMes,    setFiltroMes]    = useState("");
  const [filtroApt,    setFiltroApt]    = useState("");
  const [viewImg,      setViewImg]      = useState(null);
  const [notaModal,    setNotaModal]    = useState(null);
  const [notaText,     setNotaText]     = useState("");
  const [confirmDel,   setConfirmDel]   = useState(null);
  const [updating,     setUpdating]     = useState(null);

  const meses = [...new Set(comprobantes.map(c => c.mes).filter(Boolean))].sort((a,b) => b.localeCompare(a));
  const apts   = [...new Set(comprobantes.map(c => c.apt).filter(Boolean))].sort();

  const filtered = comprobantes
    .filter(c =>
      (filtroEstado === "todos" || c.estado === filtroEstado) &&
      (!filtroMes  || c.mes  === filtroMes) &&
      (!filtroApt  || c.apt  === filtroApt)
    )
    .sort((a, b) => (b.uploadedAt || b.fecha || "").localeCompare(a.uploadedAt || a.fecha || ""));

  const pendientes  = comprobantes.filter(c => c.estado === "pendiente").length;
  const verificados = comprobantes.filter(c => c.estado === "verificado").length;
  const rechazados  = comprobantes.filter(c => c.estado === "rechazado").length;

  const handleEstado = async (comp, nuevoEstado) => {
    const key = (comp._docId || comp.id) + nuevoEstado;
    setUpdating(key);
    setComprobantes(p => p.map(c => (c._docId||c.id) === (comp._docId||comp.id) ? { ...c, estado: nuevoEstado } : c));
    if (comp._docId) await fbSetField("comprobantes", comp._docId, { estado: nuevoEstado });
    // Notificar al residente por WhatsApp si se verificó
    if (nuevoEstado === "verificado" && comp.apt) {
      try {
        await fetch("/dev/null", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            apt:          comp.apt,
            residentName: comp.residentName || "",
            mes:          comp.mes || "",
            banco:        comp.banco || "",
            monto:        comp.monto || ""
          })
        });
      } catch (e) { console.error("Error notificando comprobante:", e); }
    }
    setUpdating(null);
  };

  const handleNota = async (comp) => {
    setComprobantes(p => p.map(c => (c._docId||c.id) === (comp._docId||comp.id) ? { ...c, notaAdmin: notaText } : c));
    if (comp._docId) await fbSetField("comprobantes", comp._docId, { notaAdmin: notaText });
    setNotaModal(null);
    setNotaText("");
  };

  const handleDelete = async (comp) => {
    if (comp._docId && window.__db) {
      const { doc, deleteDoc } = window.__fs;
      await deleteDoc(doc(window.__db, 'comprobantes', comp._docId));
    }
    setComprobantes(p => p.filter(c => (c._docId||c.id) !== (comp._docId||comp.id)));
    setConfirmDel(null);
  };

  const selStyle = { background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 12px", fontSize: 13, color: "#1e293b", outline: "none", fontFamily: "'Inter',sans-serif", cursor: "pointer" };

  return (
    <div>
      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr 1fr" : "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total",       value: comprobantes.length, color: "#6366f1", bg: "#eef2ff",  icon: "💳" },
          { label: "Pendientes",  value: pendientes,          color: "#d97706", bg: "#fefce8",  icon: "⏳" },
          { label: "Verificados", value: verificados,         color: "#059669", bg: "#f0fdf4",  icon: "✅" },
          { label: "Rechazados",  value: rechazados,          color: "#dc2626", bg: "#fef2f2",  icon: "❌" },
        ].map(s => (
          <div key={s.label} onClick={() => setFiltroEstado(s.label === "Total" ? "todos" : s.label.toLowerCase().replace("é","e").replace("í","i"))}
            style={{ background: s.bg, borderRadius: 12, padding: mob ? "12px 10px" : "16px", cursor: "pointer", border: `2px solid ${filtroEstado === (s.label === "Total" ? "todos" : s.label.toLowerCase().replace("é","e").replace("í","i")) ? s.color : "transparent"}`, transition: "border 0.15s" }}>
            <div style={{ fontSize: mob ? 18 : 22 }}>{s.icon}</div>
            <div style={{ fontSize: mob ? 22 : 28, fontWeight: 800, color: s.color, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
            <div style={{ fontSize: mob ? 10 : 12, color: "#64748b", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 16, display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
        <select value={filtroEstado} onChange={e => setFiltroEstado(e.target.value)} style={selStyle}>
          <option value="todos">Todos los estados</option>
          {ESTADOS.map(e => <option key={e.id} value={e.id}>{e.icon} {e.label}</option>)}
        </select>
        <select value={filtroMes} onChange={e => setFiltroMes(e.target.value)} style={selStyle}>
          <option value="">Todos los meses</option>
          {meses.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filtroApt} onChange={e => setFiltroApt(e.target.value)} style={selStyle}>
          <option value="">Todos los aptos</option>
          {apts.map(a => <option key={a} value={a}>Apto {a}</option>)}
        </select>
        <div style={{ marginLeft: "auto", fontSize: 12, color: "#94a3b8", fontWeight: 600 }}>{filtered.length} resultado{filtered.length !== 1 ? "s" : ""}</div>
      </div>

      {/* Lista */}
      {filtered.length === 0
        ? <div style={{ background: "#fff", borderRadius: 12, padding: 48, textAlign: "center", color: "#94a3b8" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>💳</div>
            <div style={{ fontWeight: 600 }}>Sin comprobantes</div>
            <div style={{ fontSize: 12, marginTop: 4 }}>No hay resultados con los filtros actuales.</div>
          </div>
        : filtered.map(comp => {
            const e = estComp(comp.estado);
            const compId = comp._docId || comp.id;
            const resident = residents.find(r => r.apt === comp.apt);
            return (
              <div key={compId} style={{ background: "#fff", borderRadius: 12, padding: mob ? 14 : 18, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${e.color}` }}>
                {/* Header */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{comp.concepto}</div>
                    <div style={{ fontSize: 12, color: "#64748b", marginTop: 3 }}>
                      <strong>Apto {comp.apt}</strong>
                      {resident ? ` · ${resident.nombre}` : comp.residentName ? ` · ${comp.residentName}` : ""}
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>📅 Mes: {comp.mes || "—"} · Banco: {comp.banco || "—"} · Fecha pago: {comp.fecha || "—"}</div>
                    {comp.uploadedAt && (() => {
                    const d = new Date(new Date(comp.uploadedAt).getTime() - 5*60*60*1000);
                    return <div style={{ fontSize: 10, color: "#cbd5e1", marginTop: 1 }}>Subido: {String(d.getUTCDate()).padStart(2,"0")}/{String(d.getUTCMonth()+1).padStart(2,"0")}/{d.getUTCFullYear()}</div>;
                  })()}
                  </div>
                  <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}44`, borderRadius: 20, padding: "4px 12px", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{e.icon} {e.label}</span>
                </div>

                {/* Imagen */}
                {comp.imagen && (
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 8, marginTop: 8, background: "#f8fafc", borderRadius: 8, padding: "6px 10px", cursor: "pointer", border: "1px solid #e2e8f0" }} onClick={() => setViewImg(comp.imagen)}>
                    <img src={comp.imagen} alt="comprobante" style={{ width: 48, height: 48, objectFit: "cover", borderRadius: 6 }} />
                    <span style={{ fontSize: 12, color: "#0284c7", fontWeight: 600 }}>🔍 Ver comprobante</span>
                  </div>
                )}

                {/* Nota admin */}
                {comp.notaAdmin && (
                  <div style={{ background: "#f8fafc", borderRadius: 8, padding: "8px 12px", marginTop: 10, fontSize: 12, color: "#475569" }}>
                    <strong>📝 Nota:</strong> {comp.notaAdmin}
                  </div>
                )}

                {/* Acciones */}
                <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
                  {ESTADOS.map(est => est.id !== comp.estado && (
                    <button key={est.id}
                      onClick={() => handleEstado(comp, est.id)}
                      disabled={updating === compId + est.id}
                      style={{ background: est.bg, color: est.color, border: `1px solid ${est.color}44`, borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 600, opacity: updating === compId + est.id ? 0.6 : 1 }}>
                      {updating === compId + est.id ? "..." : `${est.icon} ${est.label}`}
                    </button>
                  ))}
                  <button onClick={() => { setNotaModal(comp); setNotaText(comp.notaAdmin || ""); }}
                    style={{ background: "#f1f5f9", color: "#475569", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>
                    📝 Nota
                  </button>
                  {confirmDel === compId
                    ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: "#dc2626", fontWeight: 600 }}>¿Eliminar?</span>
                        <button onClick={() => handleDelete(comp)} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
                        <button onClick={() => setConfirmDel(null)} style={{ background: "#f3f4f6", color: "#6b7280", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
                      </div>
                    : <button onClick={() => setConfirmDel(compId)}
                        style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>
                        🗑️ Eliminar
                      </button>
                  }
                </div>
              </div>
            );
          })
      }

      {/* Modal nota */}
      {notaModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, padding: 20 }}>
          <div style={{ background: "#fff", borderRadius: 14, padding: 24, width: "100%", maxWidth: 420 }}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>📝 Nota para Apto {notaModal.apt}</div>
            <textarea value={notaText} onChange={e => setNotaText(e.target.value)} rows={4}
              placeholder="Ej: Pago verificado. Transferencia recibida el 15/05."
              style={{ width: "100%", border: "1px solid #e2e8f0", borderRadius: 8, padding: "10px 12px", fontSize: 13, fontFamily: "'Inter',sans-serif", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
            <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
              <button onClick={() => handleNota(notaModal)} style={{ flex: 1, background: "#0d1b2a", color: "#fff", border: "none", borderRadius: 8, padding: "11px", fontWeight: 700, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>Guardar</button>
              <button onClick={() => { setNotaModal(null); setNotaText(""); }} style={{ flex: 1, background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 8, padding: "11px", cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      <ImagenVisor src={viewImg} onClose={() => setViewImg(null)} />
    </div>
  );
}

function ComprobantesView({ user, comprobantes, setComprobantes, mob }) {
  const CONCEPTOS = ["Cuota ordinaria", "Cuota extraordinaria", "Fondo de reserva", "Multa", "Otro"];
  const BANCOS    = ["Banistmo", "Banco General", "BAC Credomatic", "Global Bank", "Multibank", "Caja de Ahorros", "Scotiabank", "Otro"];
  const ESTADOS   = [
    { id: "pendiente",  label: "Pendiente revisión", color: "#d97706", bg: "#fefce8", icon: "⏳" },
    { id: "verificado", label: "Verificado",          color: "#059669", bg: "#f0fdf4", icon: "✅" },
    { id: "rechazado",  label: "Rechazado",           color: "#dc2626", bg: "#fef2f2", icon: "❌" },
  ];
  const estComp = id => ESTADOS.find(e => e.id === id) || ESTADOS[0];

  const [subview, setSubview] = useState("lista");
  const [form, setForm] = useState({
    mes: new Date().toISOString().slice(0, 7),
    concepto: "Cuota ordinaria",
    banco: "Banistmo",
    fecha: new Date().toISOString().slice(0, 10),
    imagen: null,
  });
  const [saving, setSaving]       = useState(false);
  const [success, setSuccess]     = useState(false);
  const [viewImg, setViewImg]     = useState(null);
  const [confirmDel, setConfirm]  = useState(null);
  const fileRef = useRef();
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const myComps = comprobantes
    .filter(c => c.apt === user.apt)
    .sort((a, b) => (b.fecha || "").localeCompare(a.fecha || ""));

  const handleImagen = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Comprimir con canvas
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 900;
      const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      f("imagen", canvas.toDataURL("image/jpeg", 0.7));
      URL.revokeObjectURL(url);
    };
    img.src = url;
  };

  const handleSubmit = async () => {
    if (!form.imagen) { alert("Adjunta la imagen del comprobante"); return; }
    setSaving(true);
    await setComprobantes(p => [...p, {
      ...form,
      apt: user.apt,
      residentName: user.name,
      estado: "pendiente",
      notaAdmin: "",
      uploadedAt: new Date().toISOString(),
      id: Date.now(),
    }]);
    setSaving(false);
    setSuccess(true);
    setForm({ mes: new Date().toISOString().slice(0,7), concepto: "Cuota ordinaria", banco: "Banistmo", fecha: new Date().toISOString().slice(0,10), imagen: null });
    setTimeout(() => { setSuccess(false); setSubview("lista"); }, 2200);
  };

  return (
    <div>
      {/* Tabs internos */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <button onClick={() => setSubview("lista")} style={{ flex: 1, background: subview === "lista" ? "#0d1b2a" : "#fff", color: subview === "lista" ? "#f97316" : "#64748b", border: "none", borderRadius: 8, padding: "11px", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>💳 Mis pagos ({myComps.length})</button>
        <button onClick={() => setSubview("nuevo")} style={{ flex: 1, background: subview === "nuevo" ? "#0d1b2a" : "#fff", color: subview === "nuevo" ? "#f97316" : "#64748b", border: "none", borderRadius: 8, padding: "11px", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>+ Subir comprobante</button>
      </div>

      {subview === "lista" && (
        <div>
          {myComps.length === 0
            ? <div style={{ background: "#fff", borderRadius: 10, padding: 40, textAlign: "center", color: "#64748b", fontSize: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>💳</div>
                <div style={{ fontWeight: 700, marginBottom: 6 }}>Sin comprobantes enviados</div>
                <div style={{ fontSize: 12 }}>Usa "Subir comprobante" para enviar tu próximo pago.</div>
              </div>
            : myComps.map(comp => {
                const e = estComp(comp.estado);
                return (
                  <div key={comp._docId || comp.id} style={{ background: "#fff", borderRadius: 10, padding: 18, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${e.color}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 15 }}>{comp.concepto}</div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 3 }}>📅 {comp.mes} · {comp.banco}</div>
                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{comp.fecha}</div>
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                        <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}44`, borderRadius: 20, padding: "4px 12px", fontSize: 11, fontWeight: 700 }}>{e.icon} {e.label}</span>
                        {comp.estado === "pendiente" && (
                          confirmDel === (comp._docId || comp.id)
                            ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                                <span style={{ fontSize: 11, color: "#dc2626" }}>¿Eliminar?</span>
                                <button onClick={async () => { await setComprobantes(p => p.filter(c => (c._docId || c.id) !== (comp._docId || comp.id))); setConfirm(null); }} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
                                <button onClick={() => setConfirm(null)} style={{ background: "#f3f4f6", color: "#6b7280", border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
                              </div>
                            : <button onClick={() => setConfirm(comp._docId || comp.id)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️ Eliminar</button>
                        )}
                      </div>
                    </div>
                    {comp.imagen && (
                      <img src={comp.imagen} alt="comprobante" style={{ width: "100%", maxHeight: 180, objectFit: "cover", borderRadius: 8, marginTop: 12, cursor: "zoom-in" }} onClick={() => setViewImg(comp.imagen)} />
                    )}
                    {comp.notaAdmin && (
                      <div style={{ background: comp.estado === "rechazado" ? "#fef2f2" : "#fef9ee", border: `1px solid ${e.color}33`, borderRadius: 8, padding: "8px 12px", marginTop: 10, fontSize: 12, color: "#475569" }}>
                        <strong>📝 Nota administración:</strong> {comp.notaAdmin}
                      </div>
                    )}
                  </div>
                );
              })
          }
        </div>
      )}

      {subview === "nuevo" && (
        <div style={{ background: "#fff", borderRadius: 12, padding: mob ? 18 : 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          {success
            ? <div style={{ textAlign: "center", padding: 32 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
                <div style={{ fontWeight: 700, fontSize: 18, color: "#059669" }}>¡Comprobante enviado!</div>
                <div style={{ fontSize: 13, color: "#475569", marginTop: 8 }}>La administración lo revisará pronto.</div>
              </div>
            : <>
                <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 18 }}>Subir Comprobante de Pago</div>
                <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style={lblStyle}>Mes del pago *</label>
                    <input type="month" value={form.mes} onChange={e => f("mes", e.target.value)} style={inpStyle} />
                  </div>
                  <div>
                    <label style={lblStyle}>Fecha de transferencia</label>
                    <input type="date" value={form.fecha} onChange={e => f("fecha", e.target.value)} style={inpStyle} />
                  </div>
                  <div>
                    <label style={lblStyle}>Concepto *</label>
                    <select value={form.concepto} onChange={e => f("concepto", e.target.value)} style={selStyle}>
                      {CONCEPTOS.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={lblStyle}>Banco *</label>
                    <select value={form.banco} onChange={e => f("banco", e.target.value)} style={selStyle}>
                      {BANCOS.map(b => <option key={b} value={b}>{b}</option>)}
                    </select>
                  </div>
                </div>

                {/* Foto del comprobante */}
                <div style={{ marginTop: 12 }}>
                  <label style={lblStyle}>Foto del comprobante</label>
                  <div onClick={() => fileRef.current.click()} style={{ border: "2px dashed #e2e8f0", borderRadius: 10, padding: 20, textAlign: "center", cursor: "pointer", background: form.imagen ? "#f0fdf4" : "#f0f4f8", marginBottom: 8 }}>
                    {form.imagen
                      ? <img src={form.imagen} alt="preview" style={{ maxHeight: 160, maxWidth: "100%", borderRadius: 8, objectFit: "contain" }} />
                      : <div style={{ color: "#64748b", fontSize: 13 }}>📎 Adjuntar comprobante<br/><span style={{ fontSize: 11, opacity: 0.7 }}>Foto, captura de pantalla, imagen o PDF</span></div>
                    }
                  </div>
                  <input ref={fileRef} type="file" accept="image/*,application/pdf" onChange={handleImagen} style={{ display: "none" }} />
                  {form.imagen && <button onClick={() => f("imagen", null)} style={{ ...btnSec(mob), fontSize: 11 }}>✕ Quitar foto</button>}
                </div>

                <button onClick={handleSubmit} disabled={saving} style={{ ...btnPri(mob), width: "100%", marginTop: 20, textAlign: "center", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Enviando..." : "📤 Enviar comprobante"}
                </button>
              </>
          }
        </div>
      )}
      <ImagenVisor src={viewImg} onClose={() => setViewImg(null)} />
    </div>
  );
}
/* ─── VOTACIONES RESIDENTE ─── */
function VotacionesResidenteView({ user, votes, setVotes, mob }) {
  const [voting, setVoting]         = useState(null); // id del voto en proceso
  const [saving, setSaving]         = useState(false);
  const [localVotes, setLocalVotes] = useState(votes);

  // Sincronizar cuando cambie el prop externo
  useEffect(() => { setLocalVotes(votes); }, [votes]);

  const yaVoto = (voto) => (voto.respuestas || []).some(r => r.apt === user.apt);
  const miVoto = (voto) => (voto.respuestas || []).find(r => r.apt === user.apt);

  const handleVotar = async (voto, valor) => {
    if (yaVoto(voto)) return; // bloqueo: apto ya votó, no se permite cambiar
    setSaving(true);
    const nuevaResp  = { apt: user.apt, nombre: user.name, voto: valor, fecha: new Date().toISOString().slice(0,10) };
    const nuevasResp = [...(voto.respuestas || []).filter(r => r.apt !== user.apt), nuevaResp];
    const id         = voto._docId || voto.id;

    // 1. Actualización local inmediata para que la UI responda al instante
    setLocalVotes(p => p.map(v => (v._docId || v.id) === id ? { ...v, respuestas: nuevasResp } : v));
    setVoting(null);

    // 2. Persistir en Firebase solo el campo respuestas (sin re-subir todo el documento)
    if (voto._docId) {
      await fbSetField('votes', voto._docId, { respuestas: nuevasResp });
    }
    setSaving(false);
  };

  const ResLabel = ({ voto, valor }) => {
    if (!valor) return "—";
    if (voto.tipo === "binaria")      return valor === "si" ? "✅ Sí" : valor === "no" ? "❌ No" : "➖ Abstención";
    if (voto.tipo === "multiple")     return (voto.opciones || [])[parseInt(valor)] || valor;
    if (voto.tipo === "calificacion") return "★".repeat(parseInt(valor) || 0);
    return valor;
  };

  const activas  = localVotes.filter(v => v.estado === "activa");
  const cerradas = localVotes.filter(v => v.estado === "cerrada" && yaVoto(v));

  return (
    <div>
      {activas.length === 0 && cerradas.length === 0 && (
        <div style={{ background: "#fff", borderRadius: 10, padding: 40, textAlign: "center", color: "#64748b", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🗳️</div>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Sin votaciones activas</div>
          <div style={{ fontSize: 12, marginTop: 6 }}>La administración publicará votaciones aquí cuando haya temas a consultar.</div>
        </div>
      )}

      {activas.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#059669", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>● Votaciones Abiertas</div>
          {activas.map(voto => {
            const voted = yaVoto(voto);
            const mi    = miVoto(voto);
            const vid   = voto._docId || voto.id;
            return (
              <div key={vid} style={{ background: "#fff", borderRadius: 10, padding: 18, marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${voted ? "#059669" : "#f97316"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, flexWrap: "wrap" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>{voto.titulo}</div>
                    {voto.descripcion && <div style={{ fontSize: 12, color: "#475569", marginBottom: 6, lineHeight: 1.5 }}>{voto.descripcion}</div>}
                    <div style={{ fontSize: 11, color: "#64748b" }}>📅 {voto.fechaFin ? `Hasta: ${voto.fechaFin}` : "Sin fecha límite"} · {(voto.respuestas||[]).length} voto{(voto.respuestas||[]).length !== 1 ? "s" : ""}</div>
                  </div>
                  {voted && <span style={{ background: "#f0fdf4", color: "#059669", border: "1px solid #05966944", borderRadius: 20, padding: "4px 12px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>✅ Ya voté</span>}
                </div>

                {voted && mi ? (
                  <div style={{ background: "#f0fdf4", border: "1px solid #05966933", borderRadius: 8, padding: "12px 14px", marginTop: 12 }}>
                    <div style={{ fontSize: 11, color: "#059669", fontWeight: 700, marginBottom: 4 }}>✅ Voto registrado</div>
                    <div style={{ fontSize: 13, color: "#0f172a" }}>Tu respuesta: <strong><ResLabel voto={voto} valor={mi.voto} /></strong></div>
                    <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{mi.fecha}</div>
                  </div>
                ) : voting === vid ? (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 12, color: "#64748b", marginBottom: 10, fontWeight: 600 }}>Selecciona tu respuesta:</div>
                    {voto.tipo === "binaria" && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {[{v:"si",l:"✅ Sí, a favor",c:"#059669"},{v:"no",l:"❌ No, en contra",c:"#dc2626"},{v:"abstencion",l:"➖ Me abstengo",c:"#9ca3af"}].map(op => (
                          <button key={op.v} onClick={() => handleVotar(voto, op.v)} style={{ background: op.c+"18", color: op.c, border: `2px solid ${op.c}44`, borderRadius: 9, padding: "13px", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>{op.l}</button>
                        ))}
                      </div>
                    )}
                    {voto.tipo === "multiple" && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {(voto.opciones || []).map((op, i) => (
                          <button key={i} onClick={() => handleVotar(voto, i.toString())} style={{ background: "#f0f4f8", border: "2px solid #e2e8f0", borderRadius: 9, padding: "13px", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "'Inter',sans-serif", textAlign: "left" }}>{op}</button>
                        ))}
                      </div>
                    )}
                    {voto.tipo === "calificacion" && (
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 12, color: "#64748b", marginBottom: 10 }}>Del 1 al 5 estrellas:</div>
                        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                          {[1,2,3,4,5].map(n => (
                            <button key={n} onClick={() => handleVotar(voto, n.toString())} style={{ background: "#f0f4f8", border: "2px solid #e2e8f0", borderRadius: 9, width: 52, height: 52, fontSize: 20, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>{"★".repeat(n)}</button>
                          ))}
                        </div>
                      </div>
                    )}
                    <button onClick={() => setVoting(null)} style={{ ...btnSec(mob), marginTop: 12, width: "100%", textAlign: "center" }}>Cancelar</button>
                  </div>
                ) : (
                  <button onClick={() => setVoting(vid)} disabled={saving} style={{ ...btnPri(mob), width: "100%", textAlign: "center", marginTop: 14, opacity: saving ? 0.7 : 1 }}>
                    {saving ? "⏳ Grabando..." : "🗳️ Emitir voto"}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {cerradas.length > 0 && (
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>🔒 Mis Votaciones Cerradas</div>
          {cerradas.map(voto => {
            const mi = miVoto(voto);
            return (
              <div key={voto._docId || voto.id} style={{ background: "#fff", borderRadius: 10, padding: 16, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: "4px solid #9ca3af", opacity: 0.85 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{voto.titulo}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6 }}>📅 Cerrada: {voto.fechaCierre || voto.fechaFin || "—"}</div>
                {mi && <div style={{ fontSize: 12, color: "#475569" }}>Tu voto: <strong><ResLabel voto={voto} valor={mi.voto} /></strong></div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ImagenVisor({ src, onClose }) {
  if (!src) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, padding: 16, cursor: "zoom-out" }}>
      <div style={{ position: "absolute", top: 16, right: 20, color: "#fff", fontSize: 28, cursor: "pointer", fontWeight: 700, lineHeight: 1 }} onClick={onClose}>✕</div>
      <img src={src} alt="Comprobante" onClick={e => e.stopPropagation()} style={{ maxWidth: "100%", maxHeight: "90vh", borderRadius: 10, objectFit: "contain", boxShadow: "0 8px 40px rgba(0,0,0,0.6)", cursor: "default" }} />
    </div>
  );
}

/* ─── MICRO COMPONENTS ─── */
function Card({ children }) {
  return <div style={{ background: "#fff", borderRadius: 10, padding: 18, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>{children}</div>;
}
function SectionTitle({ children }) {
  return <div style={{ fontWeight: 700, fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 14 }}>{children}</div>;
}
function FInp({ label, editing, value, onChange, type = "text", placeholder }) {
  return (
    <div style={{ marginBottom: 12 }}>
      {label && <label style={lblStyle}>{label}</label>}
      {editing ? <input style={inpStyle} type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
               : <div style={{ fontSize: 13, color: value ? "#1e293b" : "#d1d5db", padding: "4px 0" }}>{value || "—"}</div>}
    </div>
  );
}
function FSel({ label, editing, value, onChange, opts }) {
  return (
    <div style={{ marginBottom: 12 }}>
      {label && <label style={lblStyle}>{label}</label>}
      {editing ? <select style={{ ...inpStyle, cursor: "pointer" }} value={value} onChange={e => onChange(e.target.value)}>
                   {opts.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
                 </select>
               : <div style={{ fontSize: 13, padding: "4px 0" }}>{opts.find(o => o.v === value)?.l || value}</div>}
    </div>
  );
}
function FTxt({ label, editing, value, onChange, placeholder }) {
  return (
    <div style={{ marginBottom: 12 }}>
      {label && <label style={lblStyle}>{label}</label>}
      {editing ? <textarea style={{ ...inpStyle, height: 84, resize: "vertical" }} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} />
               : <div style={{ fontSize: 13, color: value ? "#1e293b" : "#d1d5db", padding: "4px 0", lineHeight: 1.6 }}>{value || placeholder || "—"}</div>}
    </div>
  );
}

/* ─── STYLES ─── */
const selStyle = { background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 12px", fontSize: 13, cursor: "pointer", color: "#1e293b", fontFamily: "'Inter',sans-serif", outline: "none" };
const inpStyle = { width: "100%", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: "#1e293b", outline: "none", boxSizing: "border-box", fontFamily: "'Inter',sans-serif" };
const lblStyle = { display: "block", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.7, marginBottom: 5 };
const btnPri = (mob) => ({ background: "#f97316", color: "#fff", border: "none", borderRadius: 8, padding: mob ? "9px 14px" : "10px 20px", fontWeight: 600, cursor: "pointer", fontSize: mob ? 12 : 13, fontFamily: "'Inter',sans-serif", letterSpacing: 0.2 });
const btnSec = (mob) => ({ background: "#fff", color: "#475569", border: "1px solid #e2e8f0", borderRadius: 8, padding: mob ? "9px 14px" : "10px 20px", cursor: "pointer", fontSize: mob ? 12 : 13, fontFamily: "'Inter',sans-serif", fontWeight: 500 });

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
