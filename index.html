<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VORTEX PH — Administración de Propiedad Horizontal</title>
  <script>
    // Tema día (6:00–17:59) / noche (18:00–5:59) antes del primer render, sin parpadeo
    (function () {
      var h = new Date().getHours();
      document.documentElement.setAttribute("data-theme", h >= 6 && h < 18 ? "day" : "night");
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="brand-mark">Vortex PH</div>
      <h1 class="login-title">Bienvenido</h1>
      <p class="login-sub">PH Torre Aurora · Ciudad de Panamá</p>

      <div class="role-cards" id="roleCards"></div>

      <div class="field"><label>CLAVE DE ACCESO · 4 DÍGITOS</label></div>
      <div class="otp-row" id="pinRow">
        <input maxlength="1" inputmode="numeric" type="password" autocomplete="off" />
        <input maxlength="1" inputmode="numeric" type="password" autocomplete="off" />
        <input maxlength="1" inputmode="numeric" type="password" autocomplete="off" />
        <input maxlength="1" inputmode="numeric" type="password" autocomplete="off" />
      </div>
      <button class="btn btn-primary" id="btnLogin">Ingresar →</button>

      <div class="login-note">🔐 <strong>Demo:</strong> elige un rol e ingresa cualquier clave de 4 dígitos.</div>
      <div class="sec-badges">
        <span class="sec-badge">🔒 TLS 1.3</span>
        <span class="sec-badge">🔑 Clave de 4 dígitos</span>
        <span class="sec-badge">📜 Auditoría inmutable</span>
        <span class="sec-badge">🗄️ Cifrado en reposo</span>
      </div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="topbar-inner">
        <button class="icon-btn menu-btn" id="btnMenu" onclick="openNav()" title="Menú de módulos" aria-label="Menú">☰</button>
        <span class="brand-mark">Vortex PH</span>
        <span class="current-module" id="currentModule"></span>
        <nav class="nav-tabs" id="navTabs"></nav>
        <div class="topbar-right">
          <span class="session-chip" id="sessionChip">⏱ 30:00</span>
          <button class="icon-btn" id="btnTheme" title="Tema día / noche" onclick="toggleTheme()">🌙</button>
          <button class="icon-btn notif-btn" id="btnNotif" title="Notificaciones" onclick="openNotifs()">🔔<span class="notif-badge hidden" id="notifBadge">0</span></button>
          <span class="role-chip admin" id="roleChip"></span>
          <button class="icon-btn" id="btnLogout" title="Cerrar sesión">⏻</button>
        </div>
      </div>
    </header>
    <main class="main" id="view"></main>
    <button class="fab hidden" id="fabSim">💬 <span>Simular reporte de WhatsApp</span></button>

    <!-- Menú móvil -->
    <div id="navDrawer" class="nav-drawer hidden">
      <div class="nav-drawer-overlay" onclick="closeNav()"></div>
      <aside class="nav-drawer-panel">
        <div class="ndp-head">
          <span class="ndp-brand">Vortex PH</span>
          <button class="modal-x" onclick="closeNav()" aria-label="Cerrar menú">✕</button>
        </div>
        <div id="drawerLinks"></div>
      </aside>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
