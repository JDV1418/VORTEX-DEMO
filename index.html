  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const XLSX = window.XLSX;

    const useFirebase = () => {
      const [ready, setReady] = useState(!!window.__db);
      useEffect(() => {
        if (window.__db) { setReady(true); return; }
        const h = () => setReady(true);
        window.addEventListener('firebase-ready', h);
        return () => window.removeEventListener('firebase-ready', h);
      }, []);
      return ready;
    };

    const useCollection = (collName) => {
      const [data, setData] = useState([]);
      const fbReady = useFirebase();
      useEffect(() => {
        if (!fbReady || !window.__db) return;
        const { collection, onSnapshot } = window.__fs;
        const unsub = onSnapshot(collection(window.__db, collName), snap => {
          setData(snap.docs.map(d => ({ ...d.data(), _docId: d.id })));
        });
        return unsub;
      }, [fbReady, collName]);
      return data;
    };

    const compressImage = (dataUrl, maxWidth = 900, quality = 0.65) => new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });

    const compressImages = async (images) => {
      if (!images || !images.length) return [];
      return Promise.all(images.map(async img => ({ ...img, data: img.data ? await compressImage(img.data) : img.data })));
    };

    const fbAdd = async (collName, data) => {
      if (!window.__db) return null;
      const { collection, addDoc } = window.__fs;
      const { _docId, ...clean } = data;
      const ref = await addDoc(collection(window.__db, collName), clean);
      return ref.id;
    };

    const fbAddWithImages = async (collName, data) => {
      if (!window.__db) return null;
      const { collection, addDoc } = window.__fs;
      const { _docId, ...clean } = data;
      const images = await compressImages(clean.images || []);
      const docs = (clean.docs || []).map(d => ({ name: d.name, type: d.type, size: d.size, uploadedAt: d.uploadedAt, data: d.data || '' }));
      const ref = await addDoc(collection(window.__db, collName), { ...clean, images, docs });
      return ref.id;
    };

    const fbUpdate = async (collName, docId, data) => {
      if (!window.__db || !docId) return;
      const { doc, updateDoc } = window.__fs;
      const { _docId, ...safe } = data;
      const images = await compressImages(safe.images || []);
      const docs = (safe.docs || []).map(d => ({ name: d.name, type: d.type, size: d.size, uploadedAt: d.uploadedAt, data: d.data || '' }));
      await updateDoc(doc(window.__db, collName, docId), { ...safe, images, docs });
    };

    /* Actualiza solo campos específicos, sin tocar imágenes */
    const fbSetField = async (collName, docId, fields) => {
      if (!window.__db || !docId) return;
      const { doc, updateDoc } = window.__fs;
      await updateDoc(doc(window.__db, collName, docId), fields);
    };

    const fbDelete = async (collName, docId) => {
      if (!window.__db || !docId) return;
      const { doc, deleteDoc } = window.__fs;
      await deleteDoc(doc(window.__db, collName, docId));
    };

function useMobile() {
  const [mob, setMob] = useState(window.innerWidth < 720);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 720);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mob;
}

/* Formatea cualquier número como VDS-0001 */
const fmtTicket = (n) => n ? `VDS-${String(n).padStart(4, '0')}` : '—';
const fmtDateTime = r => {
  const ts = r.createdAt || r.date || "";
  if (!ts) return "—";
  if (ts.length <= 10) return ts; // solo fecha, sin conversión
  const utc = new Date(ts);
  if (isNaN(utc)) return ts;
  // Panama es siempre UTC-5 (sin horario de verano)
  const pa = new Date(utc.getTime() - 5 * 60 * 60 * 1000);
  const dd   = String(pa.getUTCDate()).padStart(2,"0");
  const mm   = String(pa.getUTCMonth()+1).padStart(2,"0");
  const yyyy = pa.getUTCFullYear();
  let   hh   = pa.getUTCHours();
  const min  = String(pa.getUTCMinutes()).padStart(2,"0");
  const ampm = hh >= 12 ? "p.m." : "a.m.";
  hh = hh % 12 || 12;
  return `${dd}/${mm}/${yyyy}, ${hh}:${min} ${ampm}`;
};
/* Calcula el siguiente número de ticket disponible, máximo 1000 */
const nextTicketNum = (reports) => {
  const next = Math.max(0, ...reports.map(r => Number(r.ticketNum) || 0)) + 1;
  return Math.min(next, 1000);
};

/* ─── APP ROOT ─── */
function App() {
  const fbReports      = useCollection('reports');
  const fbVendors      = useCollection('vendors');
  const fbResidents    = useCollection('residents');
  const fbInspections  = useCollection('inspections');
  const fbComprobantes = useCollection('comprobantes');
  const fbVotes        = useCollection('votes');
  const [user, setUser] = useState(() => {
    try { const s = localStorage.getItem('vds_session'); return s ? JSON.parse(s) : null; } catch { return null; }
  });

  const handleLogin = (u) => {
    setUser(u);
    try { localStorage.setItem('vds_session', JSON.stringify(u)); } catch {}
  };
  const handleLogout = () => {
    setUser(null);
    try { localStorage.removeItem('vds_session'); } catch {}
  };
  const [reports,      setReportsLocal]      = useState([]);
  const [vendors,      setVendorsLocal]      = useState([]);
  const [residents,    setResidentsLocal]    = useState([]);
  const [inspections,  setInspectionsLocal]  = useState([]);
  const [comprobantes, setComprobantesLocal] = useState([]);
  const [votes,        setVotesLocal]        = useState([]);

  useEffect(() => {
    if (!fbReports.length) return;
    const withNum    = fbReports.filter(r => r.ticketNum);
    const withoutNum = fbReports.filter(r => !r.ticketNum);
    if (!withoutNum.length) { setReportsLocal(fbReports); return; }
    // Ordenar los sin número por id (timestamp) para mantener orden cronológico
    const sorted = [...withoutNum].sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));
    let next = Math.max(0, ...withNum.map(r => Number(r.ticketNum) || 0));
    const backfilled = sorted.map(r => {
      next = Math.min(next + 1, 1000);
      return { ...r, ticketNum: next };
    });
    // Persistir ticketNum en Firebase sin tocar imágenes
    backfilled.forEach(r => { if (r._docId) fbSetField('reports', r._docId, { ticketNum: r.ticketNum }); });
    setReportsLocal([...withNum, ...backfilled]);
  }, [fbReports.length]);
  useEffect(() => { if (fbVendors.length)      setVendorsLocal(fbVendors);           }, [fbVendors.length]);
  useEffect(() => { if (fbResidents.length)    setResidentsLocal(fbResidents);       }, [fbResidents.length]);
  useEffect(() => { if (fbInspections.length)  setInspectionsLocal(fbInspections);   }, [fbInspections.length]);
  useEffect(() => { if (fbComprobantes.length) setComprobantesLocal(fbComprobantes); }, [fbComprobantes.length]);
  useEffect(() => { if (fbVotes.length) setVotesLocal(fbVotes); },
    // eslint-disable-next-line
    [fbVotes.map(v => (v._docId||v.id) + (v.respuestas||[]).length).join('|')]);

  const setReports = async (updater) => {
    const prev = reports, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const r of next) { if (!r._docId) await fbAddWithImages('reports', r); }
    for (const r of prev) { if (r._docId && !next.find(x => x._docId === r._docId)) await fbDelete('reports', r._docId); }
    for (const r of next) { if (r._docId) { const o = prev.find(x => x._docId === r._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...r,_docId:''})) await fbUpdate('reports', r._docId, r); } }
  };
  const setVendors = async (updater) => {
    const prev = vendors, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const v of next) { if (!v._docId) await fbAdd('vendors', v); }
    for (const v of prev) { if (v._docId && !next.find(x => x._docId === v._docId)) await fbDelete('vendors', v._docId); }
    for (const v of next) { if (v._docId) { const o = prev.find(x => x._docId === v._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...v,_docId:''})) { const {_docId,...safe}=v; await fbUpdate('vendors', v._docId, safe); } } }
  };
  const setResidents = async (updater) => {
    const prev = residents, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const r of next) { if (!r._docId) await fbAdd('residents', r); }
    for (const r of prev) { if (r._docId && !next.find(x => x._docId === r._docId)) await fbDelete('residents', r._docId); }
    for (const r of next) { if (r._docId) { const o = prev.find(x => x._docId === r._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...r,_docId:''})) { const {_docId,...safe}=r; await fbUpdate('residents', r._docId, safe); } } }
  };
  const setInspections = async (updater) => {
    const prev = inspections, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const i of next) { if (!i._docId) await fbAdd('inspections', i); }
    for (const i of prev) { if (i._docId && !next.find(x => x._docId === i._docId)) await fbDelete('inspections', i._docId); }
    for (const i of next) { if (i._docId) { const o = prev.find(x => x._docId === i._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...i,_docId:''})) { const {_docId,...safe}=i; await fbSetField('inspections', i._docId, safe); } } }
  };
  const setComprobantes = async (updater) => {
    const prev = comprobantes, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const c of next) { if (!c._docId) await fbAddWithImages('comprobantes', c); }
    for (const c of prev) { if (c._docId && !next.find(x => x._docId === c._docId)) await fbDelete('comprobantes', c._docId); }
    for (const c of next) { if (c._docId) { const o = prev.find(x => x._docId === c._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...c,_docId:''})) { const {_docId,...safe}=c; await fbSetField('comprobantes', c._docId, safe); } } }
  };
  const setVotes = async (updater) => {
    const prev = votes, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const v of next) { if (!v._docId) await fbAdd('votes', v); }
    for (const v of prev) { if (v._docId && !next.find(x => x._docId === v._docId)) await fbDelete('votes', v._docId); }
    for (const v of next) { if (v._docId) { const o = prev.find(x => x._docId === v._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...v,_docId:''})) { const {_docId,...safe}=v; await fbUpdate('votes', v._docId, safe); } } }
  };

  if (!user) return <LoginScreen onLogin={handleLogin} residents={residents} />;
  if (user.role === "junta") return <JuntaDashboard user={user} reports={reports} residents={residents} comprobantes={comprobantes} votes={votes} onLogout={handleLogout} />;
  const handleArchiveReport = (id) => {
    setReportsLocal(p => p.map(r => (r._docId || r.id) === id ? { ...r, archivado: true } : r));
    const rep = reports.find(r => (r._docId || r.id) === id);
    if (rep?._docId) fbSetField('reports', rep._docId, { archivado: true });
  };
  const handleRestoreReport = (id) => {
    setReportsLocal(p => p.map(r => (r._docId || r.id) === id ? { ...r, archivado: false } : r));
    const rep = reports.find(r => (r._docId || r.id) === id);
    if (rep?._docId) fbSetField('reports', rep._docId, { archivado: false });
  };
  return <AdminApp user={user} reports={reports} setReports={setReports} vendors={vendors} setVendors={setVendors} residents={residents} setResidents={setResidents} inspections={inspections} setInspections={setInspections} comprobantes={comprobantes} setComprobantes={setComprobantes} votes={votes} setVotes={setVotes} onArchiveReport={handleArchiveReport} onRestoreReport={handleRestoreReport} onLogout={handleLogout} />;
}

  });
  const weekLabels = weeks.map(w => { const d = new Date(w); return `${d.getDate()}/${d.getMonth()+1}`; });

    for (let i=1; i<p.length; i++) {

      const cp2x = p[i][0] - xStep*0.4, cp2y = p[i][1];
      d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p[i][0]} ${p[i][1]}`;
    }
    return d;
  };

  const card = { background: "#fff", borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" };

    return `${dias[d.getUTCDay()]}, ${d.getUTCDate()} de ${meses[d.getUTCMonth()]}`;
  })();

  return (

          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a" }}>Edificio Demo</div>

          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ fontSize: 12, color: "#64748b", display: mob ? "none" : "block" }}>{today}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #f97316, #fbbf24)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, color: "#fff" }}>{member.initials}</div>
            <button onClick={onLogout} style={{ background: "#f1f5f9", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", color: "#64748b", fontFamily: "'Inter',sans-serif" }}>Salir</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: mob ? "16px 12px" : "24px 24px", overflowX: "hidden", width: "100%" }}>

        {/* Welcome */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: mob ? 22 : 28, fontWeight: 800, color: "#0f172a" }}>Bienvenido, {member.name.split(" ")[0]}</div>
          <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 2 }}>{member.cargo} · {member.apto} · Panel de seguimiento</div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 320px", gap: 20 }}>

          {/* LEFT COLUMN */}
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

            {/* Profile + KPI Cards Row */}
            <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "220px 1fr 1fr", gap: 16 }}>

              {/* Profile Card */}
              <div style={{ ...card, display: "flex", flexDirection: "column", alignItems: "center", padding: 24, gap: 8 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", marginBottom: 8 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#64748b" }}>Mi Perfil</span>
                </div>
                <div style={{ width: 72, height: 72, borderRadius: "50%", background: "linear-gradient(135deg, #f97316, #fbbf24)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 28, color: "#fff", boxShadow: "0 4px 16px rgba(249,115,22,0.3)" }}>
                  {member.initials}
                </div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a", textAlign: "center", marginTop: 4 }}>{member.name}</div>
                <div style={{ fontSize: 12, color: "#64748b", background: "#f1f5f9", borderRadius: 20, padding: "3px 12px" }}>{member.cargo}</div>
                <div style={{ display: "flex", gap: 16, marginTop: 8 }}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontWeight: 800, fontSize: 18, color: "#0f172a" }}>{total}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>Tickets</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontWeight: 800, fontSize: 18, color: "#dc2626" }}>{urgentes}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>Urgentes</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontWeight: 800, fontSize: 18, color: "#10b981" }}>{resueltos}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>Resueltos</div>
                  </div>
                </div>
              </div>

              {/* Gradient Card 1 — Resolución */}
              <div style={{ borderRadius: 16, padding: 24, background: "linear-gradient(135deg, #ff9a9e 0%, #fda05e 100%)", boxShadow: "0 4px 20px rgba(255,154,158,0.4)", display: "flex", flexDirection: "column", justifyContent: "space-between", minHeight: 160 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.9)" }}>Tasa de Resolución</div>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>✅</div>
                </div>
                <div>
                  <div style={{ fontSize: 52, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{resolRate}%</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)", marginTop: 6 }}>{resueltos} de {total} reportes resueltos</div>
                </div>
              </div>

              {/* Gradient Card 2 — Pagos */}
              <div style={{ borderRadius: 16, padding: 24, background: "linear-gradient(135deg, #a8edea 0%, #5bb4f5 100%)", boxShadow: "0 4px 20px rgba(91,180,245,0.4)", display: "flex", flexDirection: "column", justifyContent: "space-between", minHeight: 160 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "rgba(0,60,100,0.8)" }}>Pagos este Mes</div>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(255,255,255,0.35)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>💰</div>
                </div>
                <div>
                  <div style={{ fontSize: 52, fontWeight: 900, color: "#0c4a6e", lineHeight: 1 }}>{payRate}%</div>
                  <div style={{ fontSize: 12, color: "rgba(0,60,100,0.7)", marginTop: 6 }}>{pagosEsteMes} de {totalApts} aptos</div>
                </div>
              </div>
            </div>

            {/* Módulos activos */}
            <div style={{ ...card, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a" }}>Sistema activo</div>
                <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>3 módulos conectados</div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                {[
                  { icon: "🔥", label: "Firebase", color: "#fff3e0" },
                  { icon: "🤖", label: "Bot IA", color: "#f0fdf4" },
                  { icon: "💬", label: "WhatsApp", color: "#f0fdf4" },
                ].map(m => (
                  <div key={m.label} style={{ background: m.color, borderRadius: 12, padding: "8px 14px", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                    <span style={{ fontSize: 20 }}>{m.icon}</span>
                    <span style={{ fontSize: 10, color: "#64748b", fontWeight: 600 }}>{m.label}</span>
                  </div>
                ))}
                <div style={{ background: "#f8fafc", borderRadius: 12, padding: "8px 14px", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, border: "1px dashed #e2e8f0" }}>
                  <span style={{ fontSize: 20, color: "#cbd5e1" }}>···</span>
                  <span style={{ fontSize: 10, color: "#cbd5e1" }}>más</span>
                </div>
              </div>
            </div>

            {/* Line Chart */}
            <div style={{ ...card }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>Actividad de Reportes</div>
                  <div style={{ fontSize: 12, color: "#94a3b8" }}>Últimas 6 semanas</div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 800, color: "#0f172a" }}>{total} total</div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{ minWidth: 280 }}>
                  {/* Grid lines */}
                  {[0,1,2,3].map(i => (
                    <line key={i} x1={pad} y1={pad + i*(H-pad*2)/3} x2={W-pad} y2={pad + i*(H-pad*2)/3} stroke="#f1f5f9" strokeWidth="1"/>
                  ))}
                  {/* Area fill creados */}
                  <path d={`${smooth(creados)} L ${pad+(weeks.length-1)*xStep} ${H-pad} L ${pad} ${H-pad} Z`} fill="rgba(249,115,22,0.08)"/>
                  {/* Area fill resueltos */}
                  <path d={`${smooth(resueltos2)} L ${pad+(weeks.length-1)*xStep} ${H-pad} L ${pad} ${H-pad} Z`} fill="rgba(91,180,245,0.1)"/>
                  {/* Line creados */}
                  <path d={smooth(creados)} fill="none" stroke="#f97316" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  {/* Line resueltos */}
                  <path d={smooth(resueltos2)} fill="none" stroke="#5bb4f5" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  {/* Dots creados */}
                  {creados.map((v,i) => <circle key={i} cx={pad+i*xStep} cy={yScale(v)} r="4" fill="#fff" stroke="#f97316" strokeWidth="2"/>)}
                  {/* Dots resueltos */}
                  {resueltos2.map((v,i) => <circle key={i} cx={pad+i*xStep} cy={yScale(v)} r="4" fill="#fff" stroke="#5bb4f5" strokeWidth="2"/>)}
                  {/* X labels */}
                  {weekLabels.map((l,i) => <text key={i} x={pad+i*xStep} y={H+14} textAnchor="middle" fontSize="10" fill="#94a3b8">{l}</text>)}
                </svg>
              </div>
              <div style={{ display: "flex", gap: 20, marginTop: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 12, height: 3, borderRadius: 2, background: "#f97316" }}/>
                  <span style={{ fontSize: 11, color: "#64748b" }}>Reportes creados</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 12, height: 3, borderRadius: 2, background: "#5bb4f5" }}/>
                  <span style={{ fontSize: 11, color: "#64748b" }}>Resueltos</span>
                </div>
              </div>
            </div>

          </div>

          {/* RIGHT COLUMN */}
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

            {/* Últimos Reportes — 6 visibles + scroll */}
            <div style={{ ...card }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>Últimos Reportes</div>
                {recentReports.length > 6 && <span style={{ fontSize: 11, color: "#94a3b8" }}>{recentReports.length} activos</span>}
              </div>
              {recentReports.length === 0
                ? <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", padding: 16 }}>Sin reportes activos</div>
                : <div style={{ maxHeight: 300, overflowY: "auto", paddingRight: 4 }}>
                    {recentReports.map((r, i) => {
                      const priColor = r.priority === "alta" ? "#dc2626" : r.priority === "media" ? "#f59e0b" : "#10b981";
                      const stIcon = r.status === "listo" ? "✅" : r.status === "en_proceso" ? "🔧" : "⏳";
                      return (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < recentReports.length-1 ? "1px solid #f1f5f9" : "none" }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 600, fontSize: 13, color: "#0f172a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.title}</div>
                            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>Apto {r.apt} · {fmtDateTime(r)}</div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: 8 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: priColor, flexShrink: 0 }}/>
                            <span style={{ fontSize: 14 }}>{stIcon}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
              }
            </div>

            {/* Por Prioridad — gráfico de pastel SVG */}
            <div style={{ ...card }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a", marginBottom: 16 }}>Por Prioridad</div>
              {(() => {
                const alta  = reports.filter(r => r.priority === "alta").length;
                const media = reports.filter(r => r.priority === "media").length;
                const baja  = reports.filter(r => r.priority === "baja").length;
                const tot   = alta + media + baja || 1;
                const pcts  = [
                  { label: "🔴 Urgente",       count: alta,  pct: Math.round(alta/tot*100),  color: "#dc2626" },
                  { label: "🟡 Importante",    count: media, pct: Math.round(media/tot*100), color: "#f59e0b" },
                  { label: "🟢 Puede esperar", count: baja,  pct: Math.round(baja/tot*100),  color: "#10b981" },
                ].filter(p => p.count > 0);
                // SVG pie
                const cx = 60, cy = 60, r = 55;
                let angle = -90;
                const slices = pcts.map(p => {
                  const start = angle;
                  const sweep = (p.pct / 100) * 360;
                  angle += sweep;
                  const a1 = start * Math.PI/180, a2 = (start+sweep) * Math.PI/180;
                  const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
                  const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
                  const large = sweep > 180 ? 1 : 0;
                  return { ...p, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z` };
                });
                return (
                  <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                    <svg width={120} height={120} viewBox="0 0 120 120">
                      {pcts.length === 1
                        ? <circle cx={cx} cy={cy} r={r} fill={pcts[0].color} />
                        : slices.map((s, i) => <path key={i} d={s.d} fill={s.color} />)
                      }
                      <circle cx={cx} cy={cy} r={30} fill="#fff" />
                      <text x={cx} y={cy+4} textAnchor="middle" fontSize={11} fontWeight="700" fill="#0f172a">{tot}</text>
                      <text x={cx} y={cy+15} textAnchor="middle" fontSize={7} fill="#94a3b8">total</text>
                    </svg>
                    <div style={{ flex: 1 }}>
                      {pcts.map((p, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                          <div style={{ width: 10, height: 10, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
                          <div style={{ flex: 1, fontSize: 12, color: "#475569" }}>{p.label}</div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: p.color }}>{p.pct}%</div>
                          <div style={{ fontSize: 11, color: "#94a3b8" }}>({p.count})</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Reportes por Categoría */}
            <div style={{ ...card }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a", marginBottom: 4 }}>Por Categoría</div>
              <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 16 }}>% del total de reportes</div>
              {topCats.length === 0
                ? <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", padding: 16 }}>Sin datos aún</div>
                : topCats.map(([cat, count], i) => (
                  <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                      <span style={{ fontSize: 13, fontWeight: 500, color: "#0f172a" }}>{catMap[cat] || cat}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: "#0f172a" }}>{Math.round(count/reports.length*100)}%</span>
                        <span style={{ fontSize: 11, color: "#94a3b8" }}>({count})</span>
                      </div>
                    </div>
                    <div style={{ height: 6, background: "#f1f5f9", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${Math.round(count/reports.length*100)}%`, background: catColors[cat] || "#94a3b8", borderRadius: 3, transition: "width 0.8s ease" }}/>
                    </div>
                  </div>
                ))
              }

              {/* Alertas */}
              {urgentes > 0 && (
                <div style={{ marginTop: 16, background: "#fef2f2", borderRadius: 10, padding: "10px 14px", border: "1px solid #fee2e2" }}>
                  <div style={{ fontWeight: 700, fontSize: 12, color: "#dc2626" }}>🔴 {urgentes} reporte{urgentes > 1 ? "s" : ""} urgente{urgentes > 1 ? "s" : ""} sin resolver</div>
                  <div style={{ fontSize: 11, color: "#991b1b", marginTop: 2 }}>Requiere atención inmediata</div>
                </div>
              )}
              {pendientes > 3 && (
                <div style={{ marginTop: 8, background: "#fffbeb", borderRadius: 10, padding: "10px 14px", border: "1px solid #fde68a" }}>
                  <div style={{ fontWeight: 700, fontSize: 12, color: "#b45309" }}>⚠️ {pendientes} reportes pendientes</div>
                  <div style={{ fontSize: 11, color: "#92400e", marginTop: 2 }}>Pendientes de asignación</div>
                </div>
              )}
            </div>

            {/* Votaciones activas */}
            {votes.filter(v => v.estado === "activa").length > 0 && (
              <div style={{ ...card }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a", marginBottom: 12 }}>🗳️ Votaciones Activas</div>
                {votes.filter(v => v.estado === "activa").map((v, i) => (
                  <div key={i} style={{ padding: "10px 0", borderBottom: "1px solid #f1f5f9" }}>
                    <div style={{ fontWeight: 600, fontSize: 13, color: "#0f172a" }}>{v.titulo}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{(v.respuestas||[]).length} votos · {v.fechaFin ? `Cierra ${v.fechaFin}` : "Sin fecha límite"}</div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── LOGIN ─── */
function LoginScreen({ onLogin, residents }) {
  const [role, setRole] = useState(null);
  const [name, setName] = useState("");
  const [password, setPassword] = useState("");
  const [passError, setPassError] = useState(false);
  const [adminUser, setAdminUser] = useState("AdminVDS");
  const [adminPin, setAdminPin] = useState("");
  const [adminError, setAdminError] = useState("");
  const mob = useMobile();

  const handleJuntaLogin = () => {
    if (!name) { setPassError(true); return; }
    if (password !== "9999") { setPassError(true); return; }
    const member = JUNTA_MEMBERS.find(m => m.name.toLowerCase().includes(name.trim().toLowerCase()));
    onLogin({ role: "junta", name: member ? member.name : name.trim() });
  };

  const handleAdminLogin = () => {
    if (adminUser.trim() !== "AdminVDS") { setAdminError("Usuario incorrecto"); return; }
    if (adminPin !== "8888") { setAdminError("PIN incorrecto"); return; }
    onLogin({ role: "admin", name: "Administradora" });
  };


  return (
    <div style={{ minHeight: "100dvh", background: "linear-gradient(135deg, #0d1b2a 0%, #1e3a5f 60%, #0d1b2a 100%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, fontFamily: "'Inter',sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 440 }}>
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ width: 64, height: 64, borderRadius: 18, background: "rgba(249,115,22,0.15)", border: "1px solid rgba(249,115,22,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, margin: "0 auto 16px" }}>🏢</div>
          <div style={{ color: "#f8fafc", fontSize: mob ? 22 : 26, fontWeight: 800, letterSpacing: -0.5 }}>Edificio Demo</div>
          <div style={{ color: "#64748b", fontSize: 12, marginTop: 6, letterSpacing: 1.5, textTransform: "uppercase" }}>Sistema de Gestión Residencial</div>
        </div>

        <div style={{ background: "rgba(255,255,255,0.05)", backdropFilter: "blur(12px)", borderRadius: 18, padding: mob ? 24 : 32, border: "1px solid rgba(255,255,255,0.1)", boxShadow: "0 24px 60px rgba(0,0,0,0.4)" }}>
          <div style={{ color: "#94a3b8", fontSize: 13, marginBottom: 18, textAlign: "center", fontWeight: 500 }}>Selecciona tu perfil de acceso</div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
            {ROLES.map(r => (
              <div key={r.id} onClick={() => { setRole(r.id); setPassError(false); setPassword(""); }} style={{
                background: role === r.id ? "rgba(249,115,22,0.15)" : "rgba(255,255,255,0.04)",
                border: `2px solid ${role === r.id ? "#f97316" : "rgba(255,255,255,0.1)"}`,
                borderRadius: 12, padding: "18px 12px", cursor: "pointer", textAlign: "center", transition: "all 0.2s"
              }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>{r.icon}</div>
                <div style={{ color: role === r.id ? "#f97316" : "#e2e8f0", fontWeight: 700, fontSize: 13 }}>{r.label}</div>
                <div style={{ color: "#64748b", fontSize: 11, marginTop: 4 }}>{r.desc}</div>
              </div>
            ))}
          </div>

          {role && (
            <div style={{ animation: "fadeIn 0.2s ease" }}>
              {role === "junta" ? (
                <>
                  <select
                    value={name}
                    onChange={e => { setName(e.target.value); setPassError(false); }}
                    style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: `1px solid ${passError ? "#dc2626" : "rgba(255,255,255,0.15)"}`, borderRadius: 10, padding: "12px 14px", color: name ? "#f8fafc" : "#64748b", fontSize: 14, boxSizing: "border-box", fontFamily: "'Inter',sans-serif", marginBottom: 12, outline: "none" }}>
                    <option value="">Selecciona tu nombre</option>
                    {JUNTA_MEMBERS.map(m => <option key={m.name} value={m.name} style={{ background: "#1e3a5f" }}>{m.name} — {m.cargo}</option>)}
                  </select>
                  <input
                    type="password"
                    maxLength={4}
                    style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: `1px solid ${passError ? "#dc2626" : "rgba(255,255,255,0.15)"}`, borderRadius: 10, padding: "12px 14px", color: "#f8fafc", fontSize: 18, letterSpacing: 6, boxSizing: "border-box", fontFamily: "'Inter',sans-serif", marginBottom: passError ? 6 : 12, outline: "none" }}
                    placeholder="PIN"
                    value={password} onChange={e => { setPassword(e.target.value); setPassError(false); }}
                    onKeyDown={e => e.key === "Enter" && name && handleJuntaLogin()}
                  />
                  {passError && <div style={{ color: "#f87171", fontSize: 12, marginBottom: 10, textAlign: "center" }}>⚠️ Contraseña incorrecta</div>}
                  <button onClick={handleJuntaLogin} style={{ width: "100%", background: "#f97316", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Inter',sans-serif", marginTop: 4, letterSpacing: 0.2, boxShadow: "0 4px 14px rgba(249,115,22,0.4)" }}>
                    Ingresar →
                  </button>
                </>
              ) : (
                <>
                  <input
                    style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: `1px solid ${adminError ? "#dc2626" : "rgba(255,255,255,0.15)"}`, borderRadius: 10, padding: "12px 14px", color: "#f8fafc", fontSize: 14, boxSizing: "border-box", fontFamily: "'Inter',sans-serif", marginBottom: 12, outline: "none" }}
                    placeholder="Usuario"
                    value={adminUser} onChange={e => { setAdminUser(e.target.value); setAdminError(""); }}
                    onKeyDown={e => e.key === "Enter" && handleAdminLogin()}
                  />
                  <input
                    type="password"
                    maxLength={6}
                    style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: `1px solid ${adminError ? "#dc2626" : "rgba(255,255,255,0.15)"}`, borderRadius: 10, padding: "12px 14px", color: "#f8fafc", fontSize: 18, letterSpacing: 6, boxSizing: "border-box", fontFamily: "'Inter',sans-serif", marginBottom: adminError ? 6 : 12, outline: "none" }}
                    placeholder="PIN"
                    value={adminPin} onChange={e => { setAdminPin(e.target.value.replace(/\D/g,"").slice(0,6)); setAdminError(""); }}
                    onKeyDown={e => e.key === "Enter" && handleAdminLogin()}
                  />
                  {adminError && <div style={{ color: "#f87171", fontSize: 12, marginBottom: 10, textAlign: "center" }}>⚠️ {adminError}</div>}
                  <button
                    onClick={handleAdminLogin}
                    style={{ width: "100%", background: "#f97316", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Inter',sans-serif", marginTop: 4, letterSpacing: 0.2, boxShadow: "0 4px 14px rgba(249,115,22,0.4)" }}>
                    Ingresar →
                  </button>
                </>
              )}
            </div>
          )}
        </div>
        <div style={{ color: "#334155", textAlign: "center", fontSize: 11, marginTop: 18 }}>v2.0 · 20 Apartamentos · Edificio Demo</div>
      </div>
      <style>{`@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }`}</style>
    </div>
  );
}

/* ─── ADMIN APP ─── */
function AdminApp({ user, reports, setReports, vendors, setVendors, residents, setResidents, inspections, setInspections, comprobantes, setComprobantes, votes, setVotes, onArchiveReport, onRestoreReport, onLogout }) {
  const [view, setView]             = useState("dashboard");
  const [filterCat, setFC]          = useState("all");
  const [filterSta, setFS]          = useState("all");
  const [filterTxt, setFT]          = useState("");
  const [selectedReport, setSR]     = useState(null);
  const [showNewReport, setSNR]     = useState(false);
  const [showNewVendor, setSNV]     = useState(false);
  const [showNewResident, setSNRes] = useState(false);
  const mob = useMobile();

  const navItems = [
    { id: "dashboard",     icon: "📊", label: "Panel" },
    { id: "reports",       icon: "📋", label: "Reportes" },
    { id: "inspecciones",  icon: "✅", label: "Checklists" },
    { id: "vendors",       icon: "🏢", label: "Proveedores" },
    { id: "residentes",    icon: "👥", label: "Residentes" },
    { id: "comprobantes",  icon: "💳", label: "Comprobantes" },
    { id: "comunicados",   icon: "📢", label: "Comunicados" },
    { id: "votaciones",    icon: "🗳️", label: "Votaciones" },
  ];

  const exportExcel = useCallback(() => {
    const data = reports.map(r => ({
      "ID": fmtTicket(r.ticketNum || r.id),
      "Título": r.title,
      "Categoría": cat(r.category).label,
      "Apartamento": r.apt,
      "Reportado por": r.reporterName,
      "Teléfono": r.reporterPhone,
      "Fecha": r.date,
      "Prioridad": pri(r.priority).label,
      "Estado": sta(r.status).label,
      "Proveedor": r.vendor || "Sin asignar",
      "Descripción": r.description,
      "Notas": r.notes,
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{ wch: 5 }, { wch: 35 }, { wch: 14 }, { wch: 12 }, { wch: 20 }, { wch: 14 }, { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 22 }, { wch: 40 }, { wch: 30 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Reportes");
    XLSX.writeFile(wb, `reportes_${new Date().toISOString().slice(0,10)}.xlsx`);
  }, [reports]);

  const printSummary = () => {
    const pending = reports.filter(r => r.status === "pendiente").length;
    const inProg  = reports.filter(r => r.status === "en_proceso").length;
    const done    = reports.filter(r => r.status === "listo").length;
    const urgent  = reports.filter(r => r.priority === "alta" && r.status !== "listo");

    const win = window.open("", "_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe Junta - Edificio Demo</title>
    <style>
      body { font-family: 'Inter',sans-serif; margin: 0; padding: 32px; color: #0f172a; }
      h1 { font-size: 22px; border-bottom: 3px solid #0d1b2a; padding-bottom: 10px; }
      h2 { font-size: 15px; color: #555; margin-top: 28px; text-transform: uppercase; letter-spacing: 1px; }
      .stats { display: flex; gap: 20px; margin: 20px 0; }
      .stat { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 14px; text-align: center; }
      .stat-num { font-size: 36px; font-weight: 700; }
      .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
      th { background: #0d1b2a; color: #fff; padding: 8px 10px; text-align: left; }
      td { padding: 7px 10px; border-bottom: 1px solid #eee; }
      tr:nth-child(even) td { background: #f9f9f9; }
      .badge { border-radius: 20px; padding: 2px 10px; font-size: 10px; font-weight: 700; }
      footer { margin-top: 40px; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 12px; }
      @media print { @page { margin: 20mm; } }
    </style></head><body>
    <h1>🏢 Informe de Gestión — Edificio Demo</h1>
    <p style="color:#888;font-size:13px">Generado: ${new Date().toLocaleDateString("es-ES", { weekday:"long", year:"numeric", month:"long", day:"numeric" })} · 20 Apartamentos</p>
    <h2>Resumen General</h2>
    <div class="stats">
      <div class="stat"><div class="stat-num">${reports.length}</div><div class="stat-label">Total Reportes</div></div>
      <div class="stat" style="border-color:#d97706"><div class="stat-num" style="color:#d97706">${pending}</div><div class="stat-label">Por Asignar</div></div>
      <div class="stat" style="border-color:#2563eb"><div class="stat-num" style="color:#2563eb">${inProg}</div><div class="stat-label">En Proceso</div></div>
      <div class="stat" style="border-color:#059669"><div class="stat-num" style="color:#059669">${done}</div><div class="stat-label">Resueltos</div></div>
    </div>
    ${urgent.length > 0 ? `<h2>⚠ Urgentes Sin Resolver (${urgent.length})</h2>
    <table><tr><th>Título</th><th>Categoría</th><th>Apto</th><th>Estado</th><th>Proveedor</th></tr>
    ${urgent.map(r=>`<tr><td>${r.title}</td><td>${cat(r.category).label}</td><td>${r.apt}</td><td>${sta(r.status).label}</td><td>${r.vendor||"Sin asignar"}</td></tr>`).join("")}
    </table>` : `<p style="color:#059669;font-weight:700">✅ No hay reportes urgentes activos.</p>`}
    <h2>Todos los Reportes</h2>
    <table><tr><th>#</th><th>Título</th><th>Categoría</th><th>Apto</th><th>Fecha</th><th>Estado</th><th>Proveedor</th></tr>
    ${reports.map(r=>`<tr><td>${fmtTicket(r.ticketNum||r.id)}</td><td>${r.title}</td><td>${cat(r.category).label}</td><td>${r.apt}</td><td>${fmtDateTime(r)}</td><td>${sta(r.status).label}</td><td>${r.vendor||"—"}</td></tr>`).join("")}
    </table>
    <footer>Edificio Demo v2.0 · Generado por ${user.name} · ${new Date().toLocaleString("es-ES")}</footer>
    </body></html>`);
    win.document.close();
    win.print();
  };

  const filteredReports = reports.filter(r => {
    const q = filterTxt.toLowerCase().trim();
    const matchTxt = !q || [r.title, r.description, r.apt, r.reporterName, r.notes, r.vendor].some(f => (f||"").toLowerCase().includes(q));
    return !r.archivado && matchTxt &&
      (filterCat === "all" || r.category === filterCat) &&
      (filterSta === "all" || r.status === filterSta);
  }).sort((a,b) => (a.date||"").localeCompare(b.date||""));
  const archivedReports = reports.filter(r => r.archivado).sort((a,b) => (b.date||"").localeCompare(a.date||""));

  return (
    <div style={{ display: "flex", height: "100dvh", fontFamily: "'Inter',sans-serif", background: "#f0f4f8", color: "#1e293b", flexDirection: mob ? "column" : "row" }}>
      {/* DESKTOP SIDEBAR */}
      {!mob && (
        <div style={{ width: 220, background: "#0d1b2a", color: "#fff", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ fontSize: 24, marginBottom: 6 }}>🏢</div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#f8fafc", letterSpacing: 0.2 }}>Edificio Demo</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>20 Apartamentos</div>
          </div>
          {navItems.map(item => (
            <button key={item.id} onClick={() => { setView(item.id); setSR(null); }} style={{
              background: view === item.id ? "rgba(249,115,22,0.12)" : "transparent",
              border: "none", color: view === item.id ? "#f97316" : "#94a3b8",
              padding: "12px 20px", display: "flex", alignItems: "center", gap: 11,
              cursor: "pointer", textAlign: "left", width: "100%",
              borderLeft: view === item.id ? "3px solid #f97316" : "3px solid transparent",
              fontSize: 13, fontFamily: "'Inter',sans-serif", transition: "all 0.15s", fontWeight: view === item.id ? 600 : 400
            }}>
              <span style={{ fontSize: 16 }}>{item.icon}</span>
              <span>{item.label}</span>
            </button>
          ))}
          <div style={{ marginTop: "auto", padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ fontSize: 12, color: "#f8fafc", fontWeight: 600 }}>{user.name}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>Admin / Junta</div>
            <button onClick={onLogout} style={{ marginTop: 10, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "#94a3b8", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 11, width: "100%", fontFamily: "'Inter',sans-serif" }}>Cerrar sesión</button>
          </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", overflowX: "hidden", marginBottom: mob ? "calc(64px + env(safe-area-inset-bottom, 0px))" : 0, maxWidth: "100vw" }}>
        {/* TOPBAR */}
        <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: mob ? "12px 16px" : "14px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: mob ? 16 : 18, color: "#0f172a", letterSpacing: -0.3 }}>
              {view === "dashboard"    && "Panel Principal"}
              {view === "reports"      && (selectedReport ? selectedReport.title : "Gestión de Reportes")}
              {view === "vendors"      && "Proveedores"}
              {view === "inspecciones" && "Checklists de Inspección"}
              {view === "residentes"   && "Base de Residentes"}
              {view === "votaciones"   && "Votaciones"}
              {view === "comprobantes" && "Comprobantes"}
              {view === "comunicados"   && "Comunicados"}
            </div>
            {!mob && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{new Date().toLocaleDateString("es-ES", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</div>}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {view === "reports" && !selectedReport && (
              <>
                <button onClick={exportExcel} style={btnSec(mob)}>📥 Excel</button>
                <button onClick={printSummary} style={btnSec(mob)}>🖨️ PDF</button>
                <button onClick={() => { if (nextTicketNum(reports) > 1000) { alert("⚠️ Se alcanzó el límite de 1000 tickets."); return; } setSNR(true); }} style={btnPri(mob)}>+ Reporte</button>
              </>
            )}
            {view === "vendors"    && <button onClick={() => setSNV(true)} style={btnPri(mob)}>+ Proveedor</button>}
            {view === "residentes" && <button onClick={() => setSNRes(true)} style={btnPri(mob)}>+ Residente</button>}
            {mob && <button onClick={onLogout} style={{ background: "transparent", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 10px", fontSize: 11, cursor: "pointer", color: "#64748b" }}>Salir</button>}
          </div>
        </div>

        {/* SCROLL AREA */}
        <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: mob ? "16px 14px 32px" : "24px 28px", width: "100%" }}>
          {view === "dashboard" && <AdminDashboard reports={reports} vendors={vendors} setView={(v) => { setView(v); setSR(null); }} setFS={setFS} mob={mob} printSummary={printSummary} />}
          {view === "reports" && (
            selectedReport
              ? <ReportDetail report={selectedReport} onBack={() => setSR(null)} onUpdate={upd => { setReports(p => p.map(r => r.id === upd.id ? upd : r)); setSR(upd); }} onArchive={id => { onArchiveReport(id); setSR(null); }} vendors={vendors} mob={mob} />
              : <ReportsTable reports={filteredReports} archivedReports={archivedReports} filterCat={filterCat} setFC={setFC} filterSta={filterSta} setFS={setFS} filterTxt={filterTxt} setFT={setFT} onSelect={setSR} onRestore={id => { onRestoreReport(id); }} mob={mob} />
          )}
          {view === "inspecciones" && <InspeccionesView inspections={inspections} setInspections={setInspections} user={user} mob={mob} />}
          {view === "vendors"      && <VendorsView vendors={vendors} setVendors={setVendors} reports={reports} showNew={showNewVendor} setShowNew={setSNV} mob={mob} />}
          {view === "residentes"   && <ResidentesView residents={residents} setResidents={setResidents} reports={reports} comprobantes={comprobantes} setComprobantes={setComprobantes} showNew={showNewResident} setShowNew={setSNRes} mob={mob} />}
          {view === "votaciones"   && <VotacionesView votes={votes} setVotes={setVotes} residents={residents} user={user} mob={mob} />}
          {view === "comprobantes" && <ComprobantesAdmin comprobantes={comprobantes} setComprobantes={setComprobantes} residents={residents} mob={mob} />}
          {view === "comunicados"   && <ComunicadosView residents={residents} mob={mob} />}
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      {mob && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0d1b2a", borderTop: "1px solid rgba(255,255,255,0.07)", zIndex: 100, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.ceil(navItems.length/2)}, 1fr)` }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => { setView(item.id); setSR(null); }} style={{
                background: "transparent", border: "none", padding: "6px 2px",
                color: view === item.id ? "#f97316" : "#475569", cursor: "pointer", fontFamily: "'Inter',sans-serif",
                borderBottom: view === item.id ? "2px solid #f97316" : "2px solid transparent"
              }}>
                <div style={{ fontSize: 16 }}>{item.icon}</div>
                <div style={{ fontSize: 8, marginTop: 1, fontWeight: view === item.id ? 700 : 400, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item.label}</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {showNewReport && <NewReportModal onClose={() => setSNR(false)} onSave={r => { const tn = nextTicketNum(reports); setReports(p => [...p, { ...r, id: Date.now(), ticketNum: tn, date: new Date().toISOString().slice(0,10), createdAt: new Date().toISOString() }]); setSNR(false); }} vendors={vendors} mob={mob} />}
    </div>
  );
}

/* ─── ADMIN DASHBOARD ─── */
function AdminDashboard({ reports, vendors, setView, setFS, mob, printSummary }) {
  const stats = [
    { label: "Total Reportes",  value: reports.length,                                         icon: "📋", color: "#6366f1", bg: "#eef2ff", status: null },
    { label: "Por Asignar",     value: reports.filter(r => r.status === "pendiente").length,   icon: "⏳", color: "#f59e0b", bg: "#fefce8", status: "pendiente" },
    { label: "En Proceso",      value: reports.filter(r => r.status === "en_proceso").length,  icon: "🔄", color: "#3b82f6", bg: "#eff6ff", status: "en_proceso" },
    { label: "Resueltos",       value: reports.filter(r => r.status === "listo").length,       icon: "✅", color: "#10b981", bg: "#ecfdf5", status: "listo" },
  ];
  const byCat = CATS.map(c => ({ ...c, count: reports.filter(r => r.category === c.id).length })).filter(c => c.count > 0).sort((a,b) => b.count - a.count);
  const urgent = reports.filter(r => r.priority === "alta" && r.status !== "listo");
  const card = { background: "#fff", borderRadius: 14, boxShadow: "0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04)" };

  return (
    <div>
      {/* Stat cards */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 14, marginBottom: 22 }}>
        {stats.map(s => (
          <div key={s.label} onClick={() => { setFS(s.status || "all"); setView("reports"); }}
            style={{ ...card, padding: mob ? "16px 14px" : "20px", cursor: "pointer", transition: "transform 0.12s, box-shadow 0.12s" }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(0,0,0,0.1)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = card.boxShadow; }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: s.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{s.icon}</div>
              <span style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginTop: 4 }}>Ver →</span>
            </div>
            <div style={{ fontSize: mob ? 30 : 36, fontWeight: 800, color: "#0f172a", lineHeight: 1, letterSpacing: -1 }}>{s.value}</div>
            <div style={{ fontSize: 12, color: "#64748b", marginTop: 5, fontWeight: 500 }}>{s.label}</div>
            <div style={{ height: 3, background: "#f1f5f9", borderRadius: 4, marginTop: 14 }}>
              <div style={{ height: "100%", width: reports.length > 0 ? `${(s.value / reports.length) * 100}%` : "0%", background: s.color, borderRadius: 4, transition: "width 0.6s" }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        {/* Reportes por categoría */}
        <div style={{ ...card, padding: mob ? 18 : 22 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a", marginBottom: 18, letterSpacing: -0.2 }}>Reportes por Categoría</div>
          {byCat.length === 0
            ? <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", padding: 20 }}>Sin reportes aún</div>
            : byCat.map(c => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 13 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: c.color + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{c.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
                    <span style={{ fontWeight: 600, color: "#1e293b" }}>{c.label}</span>
                    <span style={{ color: "#94a3b8", fontWeight: 600 }}>{c.count}</span>
                  </div>
                  <div style={{ height: 6, background: "#f1f5f9", borderRadius: 4 }}>
                    <div style={{ height: "100%", width: `${reports.length > 0 ? (c.count / reports.length) * 100 : 0}%`, background: c.color, borderRadius: 4, transition: "width 0.5s" }} />
                  </div>
                </div>
              </div>
            ))
          }
        </div>

        {/* Urgencias */}
        <div style={{ ...card, padding: mob ? 18 : 22 }}>

                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3 }}>{c.label} · Apto {r.apt} · {fmtDateTime(r)}</div>
                      <div style={{ marginTop: 5 }}><Badge status={r.status} /></div>

                  </div>

        <button onClick={printSummary} style={{ background: "#f97316", color: "#fff", border: "none", borderRadius: 9, padding: "11px 22px", fontWeight: 600, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif", letterSpacing: 0.2 }}>
          🖨️ Generar Informe PDF
        </button>
      </div>
    </div>
  );
}

/* ─── REPORTS TABLE ─── */
function ReportsTable({ reports, archivedReports = [], filterCat, setFC, filterSta, setFS, filterTxt, setFT, onSelect, onRestore, mob }) {
  const [showArchive, setShowArchive] = useState(false);

  if (showArchive) {
    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <button onClick={() => setShowArchive(false)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#f1f5f9", color: "#64748b", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>📋 Activos ({reports.length})</button>
          <button style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#d97706", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>📦 Archivo ({archivedReports.length})</button>
        </div>

              <div style={{ fontSize: 12, marginTop: 4 }}>Los reportes archivados aparecerán aquí.</div>
            </div>

              <div key={r._docId || r.id || i} style={{ background: "#fff", borderRadius: 12, padding: mob ? 14 : 18, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.05)", borderLeft: "4px solid #d97706", opacity: 0.85 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: "#d97706", fontWeight: 700, marginBottom: 2 }}>{fmtTicket(r.ticketNum || r.id)}</div>
                    <div style={{ fontWeight: 600, fontSize: 14, color: "#1e293b", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.title}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3 }}>Apto {r.apt} · {r.reporterName} · {fmtDateTime(r)}</div>
                    <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{cat(r.category).icon} {cat(r.category).label} · {sta(r.status).label}</div>

                  <button onClick={() => onRestore && onRestore(r._docId || r.id)} style={{ background: "#f0fdf4", color: "#059669", border: "1px solid #059669", borderRadius: 8, padding: "6px 12px", fontSize: 11, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 600, flexShrink: 0 }}>↩ Restaurar</button>
