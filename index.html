  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#0d1b2a", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>📋 Activos ({reports.length})</button>
        <button onClick={() => setShowArchive(true)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#f1f5f9", color: "#64748b", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>📦 Archivo ({archivedReports.length})</button>
      </div>
      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <input
          type="text"
          value={filterTxt}
          onChange={e => setFT(e.target.value)}
          placeholder="🔍 Buscar por título, apto, residente..."
          style={{ ...selStyle, flex: 1, minWidth: mob ? "100%" : 260 }}
        />
        <select value={filterCat} onChange={e => setFC(e.target.value)} style={selStyle}>
          <option value="all">Todas las categorías</option>
          {CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
        </select>
        <select value={filterSta} onChange={e => setFS(e.target.value)} style={selStyle}>
          <option value="all">Todos los estados</option>
          {STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        {filterTxt && <button onClick={() => setFT("")} style={{ background: "#fef2f2", border: "1px solid #dc262633", borderRadius: 8, padding: "6px 12px", fontSize: 12, cursor: "pointer", color: "#dc2626", fontFamily: "'Inter',sans-serif", whiteSpace: "nowrap" }}>✕ Limpiar</button>}
        <div style={{ color: "#64748b", fontSize: 12, alignSelf: "center", whiteSpace: "nowrap" }}>{reports.length} reporte{reports.length !== 1 ? "s" : ""}</div>
      </div>

      {mob ? (
        /* MOBILE: Card list */
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {reports.length === 0 && <div style={{ textAlign: "center", color: "#64748b", padding: 40, fontSize: 14 }}>Sin reportes para estos filtros</div>}
          {reports.map(r => (
            <div key={r.id} onClick={() => onSelect(r)} style={{ background: "#fff", borderRadius: 10, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${cat(r.category).color}`, cursor: "pointer" }}>
              <div style={{ fontFamily: "monospace", fontSize: 11, fontWeight: 700, color: "#64748b", marginBottom: 4 }}>{fmtTicket(r.ticketNum || r.id)}</div>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 6 }}>{r.title}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
                <CatChip category={r.category} />
                <Badge status={r.status} />
                <PriDot priority={r.priority} />
              </div>
              <div style={{ fontSize: 12, color: "#64748b" }}>Apto {r.apt} · {r.reporterName} · {fmtDateTime(r)}</div>
              {r.vendor && <div style={{ fontSize: 12, color: "#2563eb", marginTop: 4 }}>🏢 {r.vendor}</div>}
            </div>
          ))}
        </div>
      ) : (
        /* DESKTOP: Table */
        <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }}>
                {["Ticket","Título","Categoría","Apto","Reportado por","Fecha","Prioridad","Estado","Proveedor"].map(h => (
                  <th key={h} style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {reports.length === 0 && <tr><td colSpan={9} style={{ textAlign: "center", padding: 40, color: "#64748b", fontSize: 13 }}>Sin reportes para estos filtros</td></tr>}
              {reports.map(r => (
                <tr key={r.id} onClick={() => onSelect(r)} style={{ borderBottom: "1px solid #f0f4f8", cursor: "pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f8fafc"}
                  onMouseLeave={e => e.currentTarget.style.background = ""}>
                  <td style={{ padding: "11px 14px", fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: "#64748b", whiteSpace: "nowrap" }}>{fmtTicket(r.ticketNum || r.id)}</td>
                  <td style={{ padding: "11px 14px", fontWeight: 600, fontSize: 13, maxWidth: 220 }}><div style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.title}</div></td>
                  <td style={{ padding: "11px 14px" }}><CatChip category={r.category} /></td>
                  <td style={{ padding: "11px 14px", fontSize: 13 }}>{r.apt}</td>
                  <td style={{ padding: "11px 14px", fontSize: 13 }}>{r.reporterName}</td>
                  <td style={{ padding: "11px 14px", fontSize: 12, color: "#64748b" }}>{fmtDateTime(r)}</td>
                  <td style={{ padding: "11px 14px" }}><PriDot priority={r.priority} /></td>
                  <td style={{ padding: "11px 14px" }}><Badge status={r.status} /></td>
                  <td style={{ padding: "11px 14px", fontSize: 12, color: r.vendor ? "#0f172a" : "#d1d5db" }}>{r.vendor || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ─── REPORT DETAIL ─── */
function ReportDetail({ report, onBack, onUpdate, onArchive, vendors, mob }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...report });
  const [lightbox, setLightbox] = useState(null);
  const [confirmArchive, setConfirmArchive] = useState(false);
  const fileRef = useRef();

  const printReport = () => {
    const c = cat(form.category);
    const s = sta(form.status);
    const p = pri(form.priority);
    const win = window.open("", "_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${fmtTicket(form.ticketNum||form.id)}</title>
    <style>body{font-family:'Inter',sans-serif;margin:32px;color:#0f172a} h1{font-size:20px;border-bottom:3px solid #0f172a;padding-bottom:8px} .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0} .field{margin-bottom:12px} .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:3px} .value{font-size:14px} .imgs{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px} img{width:160px;height:120px;object-fit:cover;border-radius:6px;border:1px solid #ddd}</style></head><body>
    <h1>${c.icon} ${fmtTicket(form.ticketNum||form.id)}: ${form.title}</h1>
    <p style="color:#888;font-size:12px">Generado: ${new Date().toLocaleString("es-ES")}</p>
    <div class="grid">
      <div class="field"><div class="label">Categoría</div><div class="value">${c.label}</div></div>
      <div class="field"><div class="label">Estado</div><div class="value" style="color:${s.color}">${s.label}</div></div>
      <div class="field"><div class="label">Prioridad</div><div class="value" style="color:${p.color}">${p.label}</div></div>
      <div class="field"><div class="label">Apartamento</div><div class="value">${form.apt}</div></div>
      <div class="field"><div class="label">Reportado por</div><div class="value">${form.reporterName}</div></div>
      <div class="field"><div class="label">Teléfono</div><div class="value">${form.reporterPhone}</div></div>
      <div class="field"><div class="label">Fecha</div><div class="value">${fmtDateTime(form)}</div></div>
      <div class="field"><div class="label">Proveedor</div><div class="value">${form.vendor || "Sin asignar"}</div></div>
    </div>
    <div class="field"><div class="label">Descripción</div><div class="value" style="line-height:1.6">${form.description}</div></div>
    <div class="field"><div class="label">Notas internas</div><div class="value" style="line-height:1.6">${form.notes || "—"}</div></div>
    ${form.images?.length ? `<div class="label">Imágenes adjuntas (${form.images.length})</div><div class="imgs">${form.images.map(img=>`<img src="${img.data}" />`).join("")}</div>` : ""}
    </body></html>`);
    win.document.close();
    win.print();
  };

  const handleImages = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => setForm(prev => ({ ...prev, images: [...(prev.images || []), { name: file.name, data: ev.target.result }] }));
      reader.readAsDataURL(file);
    });
  };

  const f = (key, val) => setForm(p => ({ ...p, [key]: val }));

  return (
    <div>
      {/* Top actions */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        <button onClick={onBack} style={{ ...btnSec(mob), display: "flex", alignItems: "center", gap: 4 }}>← Volver</button>
        <span style={{ fontFamily: "monospace", fontSize: 13, fontWeight: 700, color: "#64748b", background: "#f0f4f8", border: "1px solid #e2e8f0", borderRadius: 8, padding: "5px 12px" }}>{fmtTicket(form.ticketNum || form.id)}</span>
        <div style={{ flex: 1 }} />
        <button onClick={printReport} style={btnSec(mob)}>🖨️ PDF</button>
        {!editing
          ? <button onClick={() => setEditing(true)} style={btnSec(mob)}>✏️ Editar</button>
          : <>
              <button onClick={() => { onUpdate(form); setEditing(false); }} style={btnPri(mob)}>💾 Guardar</button>
              <button onClick={() => { setForm({ ...report }); setEditing(false); }} style={btnSec(mob)}>Cancelar</button>
            </>
        }
        {confirmArchive
          ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#d97706", fontWeight: 600 }}>¿Archivar reporte?</span>
              <button onClick={() => { onArchive(report._docId || report.id); setConfirmArchive(false); }} style={{ background: "#d97706", color: "#fff", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
              <button onClick={() => setConfirmArchive(false)} style={{ background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
            </div>
          : <button onClick={() => setConfirmArchive(true)} style={{ ...btnSec(mob), color: "#d97706", borderColor: "#d97706" }}>📦 Archivar</button>
        }
      </div>

      {/* ── PANEL ADMINISTRATIVO (siempre editable) ── */}
      <div style={{ background: "linear-gradient(135deg, #0d1b2a, #1e3a5f)", borderRadius: 12, padding: mob ? 16 : 20, marginBottom: 16, boxShadow: "0 2px 10px rgba(0,0,0,0.15)" }}>
        <div style={{ color: "#f97316", fontWeight: 700, fontSize: 12, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>🏛️ Panel Administrativo — Junta / Administración</div>

        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr 1fr", gap: 14 }}>
          {/* Estado */}
          <div>
            <div style={{ color: "#64748b", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Estado</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {STATUSES.map(s => {
                const active = form.status === s.id;
                return (
                  <button key={s.id} onClick={() => { const upd = { ...form, status: s.id }; setForm(upd); onUpdate(upd); }}
                    style={{ background: active ? s.bg : "rgba(255,255,255,0.06)", border: `2px solid ${active ? s.color : "rgba(255,255,255,0.1)"}`, color: active ? s.color : "#64748b", borderRadius: 8, padding: "9px 12px", cursor: "pointer", fontWeight: active ? 700 : 400, fontSize: 12, fontFamily: "'Inter',sans-serif", textAlign: "left", transition: "all 0.15s" }}>
                    {s.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Urgencia — admin puede sobrescribir lo que dijo el residente */}
          <div>
            <div style={{ color: "#64748b", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 4 }}>Urgencia</div>
            {form.priority !== report.priority && (
              <div style={{ fontSize: 10, color: "#f97316", marginBottom: 6, fontStyle: "italic" }}>
                ✏️ Residente indicó: {pri(report.priority).label.replace(/🔴|🟡|🟢/g,"").trim()}
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {PRIORITIES.map(p => {
                const active = form.priority === p.id;
                return (
                  <button key={p.id} onClick={() => { const upd = { ...form, priority: p.id }; setForm(upd); onUpdate(upd); }}
                    style={{ background: active ? p.color + "22" : "rgba(255,255,255,0.06)", border: `2px solid ${active ? p.color : "rgba(255,255,255,0.1)"}`, color: active ? p.color : "#64748b", borderRadius: 8, padding: "9px 12px", cursor: "pointer", fontWeight: active ? 700 : 400, fontSize: 12, fontFamily: "'Inter',sans-serif", textAlign: "left", transition: "all 0.15s" }}>
                    {p.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Proveedor + Notas internas */}
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div>
              <div style={{ color: "#64748b", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Proveedor asignado</div>
              <select
                value={form.vendor}
                onChange={e => { const upd = { ...form, vendor: e.target.value }; setForm(upd); onUpdate(upd); }}
                style={{ width: "100%", background: "rgba(255,220,80,0.08)", border: "1px solid rgba(245,197,24,0.25)", borderRadius: 8, padding: "10px 12px", color: form.vendor ? "#f1f5f9" : "#94a3b8", fontSize: 13, fontFamily: "'Inter',sans-serif", cursor: "pointer" }}>
                <option value="">Sin asignar</option>
                {vendors.map(v => <option key={v.id} value={v.name}>{vcat(v.category).icon} {v.name}</option>)}
              </select>

              {/* Contact buttons — shown when vendor is assigned */}
              {form.vendor && (() => {
                const v = vendors.find(x => x.name === form.vendor);
                if (!v) return null;
                const cleanPhone = (v.phone || "").replace(/[\s\-\(\)]/g, "");
                const msgText = `Hola ${v.contact || v.name}, le contactamos desde la administración del edificio.\n\n📋 *Caso asignado:* ${form.title}\n📍 *Ubicación:* Apto/Área ${form.apt}\n🔴 *Urgencia:* ${pri(form.priority).label.replace(/🔴|🟡|🟢/g,"").trim()}\n📅 *Fecha reporte:* ${fmtDateTime(form)}\n\n📝 *Descripción:* ${form.description}\n\nPor favor confirmar disponibilidad. Gracias.`;
                const waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msgText)}`;
                const mailSubject = `Caso asignado: ${form.title} — Edificio`;
                const mailBody = `Hola ${v.contact || v.name},\n\nLe contactamos desde la administración del edificio para informarle que le ha sido asignado el siguiente caso:\n\nCaso: ${form.title}\nUbicación: Apto/Área ${form.apt}\nUrgencia: ${pri(form.priority).label.replace(/🔴|🟡|🟢/g,"").trim()}\nFecha reporte: ${fmtDateTime(form)}\n\nDescripción:\n${form.description}\n\nPor favor confirmar disponibilidad y fecha de atención.\n\nGracias,\nAdministración del Edificio`;
                const mailUrl = `mailto:${v.email || ""}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`;
                return (
                  <div style={{ marginTop: 10 }}>
                    <div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Notificar al proveedor</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <a href={waUrl} target="_blank" rel="noreferrer"
                        style={{ flex: 1, background: "#25d366", color: "#fff", border: "none", borderRadius: 8, padding: "10px 8px", fontWeight: 700, fontSize: 12, cursor: "pointer", textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontFamily: "'Inter',sans-serif" }}>
                        <span style={{ fontSize: 16 }}>📱</span> WhatsApp
                      </a>
                      <a href={mailUrl}
                        style={{ flex: 1, background: v.email ? "#2563eb" : "#64748b", color: "#fff", border: "none", borderRadius: 8, padding: "10px 8px", fontWeight: 700, fontSize: 12, cursor: v.email ? "pointer" : "not-allowed", textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontFamily: "'Inter',sans-serif", opacity: v.email ? 1 : 0.5 }}
                        onClick={e => { if (!v.email) { e.preventDefault(); alert("Este proveedor no tiene correo registrado."); } }}>
                        <span style={{ fontSize: 16 }}>✉️</span> Correo
                      </a>
                    </div>
                    {!cleanPhone && <div style={{ fontSize: 10, color: "#f59e0b", marginTop: 6 }}>⚠️ Agrega el teléfono con código de país para WhatsApp (ej: 573001234567)</div>}
                  </div>
                );
              })()}
            </div>
            <div>
              <div style={{ color: "#64748b", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Notas internas</div>
              <textarea
                value={form.notes}
                onChange={e => setForm(p => ({ ...p, notes: e.target.value }))}
                onBlur={() => onUpdate(form)}
                placeholder="Observaciones, acuerdos, seguimiento..."
                style={{ width: "100%", background: "rgba(255,220,80,0.08)", border: "1px solid rgba(245,197,24,0.25)", borderRadius: 8, padding: "10px 12px", color: "#fff3c0", fontSize: 12, fontFamily: "'Inter',sans-serif", resize: "none", height: 90, outline: "none", boxSizing: "border-box" }}
              />
            </div>
          </div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 280px", gap: 14 }}>
        {/* Left col */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Card>
            <SectionTitle>Lo que reportó el residente</SectionTitle>
            <FInp label="Título" editing={editing} value={form.title} onChange={v => f("title", v)} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <FSel label="Categoría" editing={editing} value={form.category} onChange={v => f("category", v)} opts={CATS.map(c => ({ v: c.id, l: `${c.icon} ${c.label}` }))} />
              <FInp label="Apartamento" editing={editing} value={form.apt} onChange={v => f("apt", v)} />
              <div><div style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 4 }}>Fecha</div><div style={{ fontSize: 13, color: "#1e293b" }}>{fmtDateTime(form)}</div></div>
            </div>
            <FTxt label="Descripción" editing={editing} value={form.description} onChange={v => f("description", v)} />
          </Card>

          <Card>
            <SectionTitle>Imágenes ({form.images?.length || 0})</SectionTitle>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {(form.images || []).map((img, i) => (
                <div key={i} style={{ position: "relative" }}>
                  <img
                    src={img.data} alt={img.name}
                    onClick={() => setLightbox(img.data)}
                    style={{ width: mob ? 90 : 110, height: mob ? 68 : 82, objectFit: "cover", borderRadius: 8, border: "1px solid #e2e8f0", cursor: "zoom-in", transition: "opacity 0.15s" }}
                    onMouseEnter={e => e.target.style.opacity = "0.85"}
                    onMouseLeave={e => e.target.style.opacity = "1"}
                  />
                  {editing && <button onClick={() => setForm(p => ({ ...p, images: p.images.filter((_,j) => j !== i) }))} style={{ position: "absolute", top: 3, right: 3, background: "#dc2626", color: "#fff", border: "none", borderRadius: "50%", width: 18, height: 18, cursor: "pointer", fontSize: 10 }}>✕</button>}
                </div>
              ))}
              {editing && (
                <div onClick={() => fileRef.current.click()} style={{ width: mob ? 90 : 110, height: mob ? 68 : 82, border: "2px dashed #d1d5db", borderRadius: 8, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#64748b", fontSize: 11 }}>
                  <span style={{ fontSize: 20 }}>📷</span>Agregar
                </div>
              )}
              {!editing && (!form.images?.length) && <span style={{ color: "#d1d5db", fontSize: 13 }}>Sin imágenes adjuntas</span>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleImages} style={{ display: "none" }} />
          </Card>

          {lightbox && (
            <div onClick={() => setLightbox(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, cursor: "zoom-out", padding: 20 }}>
              <button onClick={() => setLightbox(null)} style={{ position: "absolute", top: 16, right: 20, background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", fontSize: 22, width: 38, height: 38, borderRadius: "50%", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
              <img src={lightbox} alt="Vista completa" style={{ maxWidth: "100%", maxHeight: "90vh", borderRadius: 10, boxShadow: "0 8px 40px rgba(0,0,0,0.6)", objectFit: "contain" }} onClick={e => e.stopPropagation()} />
            </div>
          )}
        </div>

        {/* Right col */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Card>
            <SectionTitle>Reportado por</SectionTitle>
            <FInp label="Nombre" editing={editing} value={form.reporterName} onChange={v => f("reporterName", v)} />
            <FInp label="Teléfono" editing={editing} value={form.reporterPhone} onChange={v => f("reporterPhone", v)} />
          </Card>
          <div style={{ background: "#f8fafc", borderRadius: 10, padding: 14, border: "1px solid #e2e8f0" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>Resumen actual</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 12, color: "#94a3b8" }}>Estado</span>
                <Badge status={form.status} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 12, color: "#94a3b8" }}>Urgencia</span>
                <PriDot priority={form.priority} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                <span style={{ fontSize: 12, color: "#94a3b8", flexShrink: 0 }}>Proveedor</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: form.vendor ? "#0f172a" : "#d1d5db", textAlign: "right" }}>{form.vendor || "Sin asignar"}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── INSPECCIONES VIEW ─── */
function InspeccionesView({ inspections, setInspections, user, mob }) {
  const [subview, setSubview] = useState("home"); // home | nueva | running | detail
  const [activeInsp, setActiveInsp] = useState(null);
  const [filterZone, setFilterZone]       = useState("all");
  const [filterFreq, setFilterFreq]       = useState("all");
  const [confirmDelInsp, setConfirmDelInsp] = useState(false);

  const startNew = (zoneId, frequency) => {
    const zone = ZONES.find(z => z.id === zoneId);
    const insp = {
      id: Date.now(),
      zoneId,
      frequency,
      date: new Date().toISOString().slice(0, 10),
      inspector: user.name,
      completed: false,
      items: zone.items.map(label => ({ label, status: "", note: "" })),
      generalNote: "",
    };
    setActiveInsp(insp);
    setSubview("running");
  };

  const saveInspection = (insp) => {
    const finished = { ...insp, completed: true };
    setInspections(prev => {
      const existing = prev.findIndex(i => i.id === insp.id);
      if (existing >= 0) { const arr = [...prev]; arr[existing] = finished; return arr; }
      return [...prev, finished];
    });
    setActiveInsp(finished);
    setSubview("detail");
  };

  const printInspection = (insp) => {
    const zone = ZONES.find(z => z.id === insp.zoneId);
    const freq = FREQUENCIES.find(f => f.id === insp.frequency);
    const bien = insp.items.filter(i => i.status === "bien").length;
    const aten = insp.items.filter(i => i.status === "atencion").length;
    const mal  = insp.items.filter(i => i.status === "mal").length;
    const win = window.open("", "_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Inspección ${zone.label}</title>
    <style>body{font-family:'Inter',sans-serif;margin:32px;color:#0f172a}h1{font-size:20px;border-bottom:3px solid #0f172a;padding-bottom:8px}.stats{display:flex;gap:16px;margin:16px 0}.stat{flex:1;border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center}.stat-num{font-size:28px;font-weight:700}.table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}th{background:#0f172a;color:#fff;padding:8px 10px;text-align:left}td{padding:7px 10px;border-bottom:1px solid #eee}.bien{color:#059669}.aten{color:#d97706}.mal{color:#dc2626}footer{margin-top:32px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px}</style>
    </head><body>
    <h1>${zone.icon} Inspección: ${zone.label}</h1>
    <p style="color:#888;font-size:12px">Frecuencia: ${freq?.label} · Inspector: ${insp.inspector} · Fecha: ${insp.date}</p>
    <div class="stats">
      <div class="stat" style="border-color:#059669"><div class="stat-num" style="color:#059669">${bien}</div><div style="font-size:11px;color:#888">Bien</div></div>
      <div class="stat" style="border-color:#d97706"><div class="stat-num" style="color:#d97706">${aten}</div><div style="font-size:11px;color:#888">Requiere atención</div></div>
      <div class="stat" style="border-color:#dc2626"><div class="stat-num" style="color:#dc2626">${mal}</div><div style="font-size:11px;color:#888">Mal estado</div></div>
    </div>
    <table class="table"><tr><th>#</th><th>Componente</th><th>Estado</th><th>Observación</th></tr>
    ${insp.items.map((item, i) => {
      const cls = item.status === "bien" ? "bien" : item.status === "atencion" ? "aten" : item.status === "mal" ? "mal" : "";
      const lbl = ITEM_STATUS.find(s => s.id === item.status)?.label || "—";
      return `<tr><td>${i+1}</td><td>${item.label}</td><td class="${cls}">${lbl}</td><td>${item.note || "—"}</td></tr>`;
    }).join("")}
    </table>
    ${insp.generalNote ? `<p style="margin-top:16px"><strong>Observación general:</strong> ${insp.generalNote}</p>` : ""}
    <footer>Edificio Demo · ${insp.inspector} · ${new Date().toLocaleString("es-ES")}</footer>
    </body></html>`);
    win.document.close();
    win.print();
  };

  const filtered = inspections.filter(i =>
    (filterZone === "all" || i.zoneId === filterZone) &&
    (filterFreq === "all" || i.frequency === filterFreq)
  );

  /* ── HOME ── */
  if (subview === "home") return (
    <div>
      {/* Zone cards */}
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Iniciar Nueva Inspección</div>
        <div style={{ fontSize: 12, color: "#64748b", marginBottom: 14 }}>Selecciona la zona a inspeccionar</div>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(3, 1fr)", gap: 10 }}>
          {ZONES.map(z => (
            <div key={z.id} onClick={() => { setActiveInsp({ zoneId: z.id, frequency: "" }); setSubview("nueva"); }}
              style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 12px" : "16px 14px", cursor: "pointer", border: `2px solid ${z.color}22`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = z.color; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = z.color + "22"; e.currentTarget.style.transform = ""; }}>
              <div style={{ fontSize: mob ? 24 : 28, marginBottom: 6 }}>{z.icon}</div>
              <div style={{ fontWeight: 700, fontSize: mob ? 12 : 13, color: "#0f172a" }}>{z.label}</div>
              <div style={{ fontSize: 10, color: "#64748b", marginTop: 3 }}>{z.items.length} ítems</div>
            </div>
          ))}
        </div>
      </div>

      {/* History */}
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Historial de Inspecciones</div>
          <div style={{ display: "flex", gap: 8 }}>
            <select value={filterZone} onChange={e => setFilterZone(e.target.value)} style={selStyle}>
              <option value="all">Todas las zonas</option>
              {ZONES.map(z => <option key={z.id} value={z.id}>{z.icon} {z.label}</option>)}
            </select>
            <select value={filterFreq} onChange={e => setFilterFreq(e.target.value)} style={selStyle}>
              <option value="all">Todas las frecuencias</option>
              {FREQUENCIES.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
          </div>
        </div>

        {filtered.length === 0
          ? <div style={{ background: "#fff", borderRadius: 10, padding: 32, textAlign: "center", color: "#64748b", fontSize: 13 }}>No hay inspecciones registradas aún.<br />Selecciona una zona arriba para comenzar.</div>
          : (mob
            ? [...filtered].sort((a,b) => b.date.localeCompare(a.date)).map(insp => <InspCard key={insp.id} insp={insp} onSelect={() => { setActiveInsp(insp); setSubview("detail"); }} onPrint={printInspection} />)
            : (
              <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead><tr style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }}>
                    {["Zona","Frecuencia","Fecha","Inspector","✅ Bien","⚠️ Atención","❌ Mal","Acciones"].map(h => (
                      <th key={h} style={{ padding: "10px 13px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {[...filtered].sort((a,b) => b.date.localeCompare(a.date)).map(insp => {
                      const z = ZONES.find(z => z.id === insp.zoneId);
                      const freq = FREQUENCIES.find(f => f.id === insp.frequency);
                      const bien = insp.items.filter(i => i.status === "bien").length;
                      const aten = insp.items.filter(i => i.status === "atencion").length;
                      const mal  = insp.items.filter(i => i.status === "mal").length;
                      return (
                        <tr key={insp.id} style={{ borderBottom: "1px solid #f0f4f8" }}
                          onMouseEnter={e => e.currentTarget.style.background = "#f8fafc"}
                          onMouseLeave={e => e.currentTarget.style.background = ""}>
                          <td style={{ padding: "10px 13px", fontWeight: 600, fontSize: 13 }}>{z?.icon} {z?.label}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12 }}>{freq?.label}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12, color: "#64748b" }}>{insp.date}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12 }}>{insp.inspector}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#059669" }}>{bien}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#d97706" }}>{aten}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#dc2626" }}>{mal}</td>
                          <td style={{ padding: "10px 13px" }}>
                            <button onClick={() => { setActiveInsp(insp); setSubview("detail"); }} style={{ ...btnSec(false), fontSize: 11, padding: "5px 10px", marginRight: 6 }}>Ver</button>
                            <button onClick={() => printInspection(insp)} style={{ ...btnSec(false), fontSize: 11, padding: "5px 10px" }}>🖨️</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ))
        }
      </div>
    </div>
  );

  /* ── SELECT FREQUENCY ── */
  if (subview === "nueva") {
    const zone = ZONES.find(z => z.id === activeInsp.zoneId);
    return (
      <div>
        <button onClick={() => setSubview("home")} style={{ ...btnSec(mob), marginBottom: 20 }}>← Volver</button>
        <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 4 }}>{zone.icon} {zone.label}</div>
        <div style={{ fontSize: 13, color: "#64748b", marginBottom: 22 }}>Selecciona la frecuencia de esta inspección</div>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4, 1fr)", gap: 12 }}>
          {FREQUENCIES.map(f => (
            <div key={f.id} onClick={() => startNew(zone.id, f.id)}
              style={{ background: "#fff", borderRadius: 10, padding: "20px 16px", textAlign: "center", cursor: "pointer", border: "2px solid #e2e8f0", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = zone.color; e.currentTarget.style.background = zone.color + "08"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#e2e8f0"; e.currentTarget.style.background = "#fff"; }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>{f.icon}</div>
              <div style={{ fontWeight: 700, fontSize: 14 }}>{f.label}</div>
              <div style={{ fontSize: 10, color: "#64748b", marginTop: 4 }}>cada {f.days === 1 ? "día" : f.days === 7 ? "7 días" : f.days === 14 ? "14 días" : f.days + " días"}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── RUNNING CHECKLIST ── */
  if (subview === "running" && activeInsp) {
    return <RunningChecklist insp={activeInsp} setInsp={setActiveInsp} onSave={saveInspection} onBack={() => setSubview("home")} mob={mob} />;
  }

  /* ── DETAIL ── */
  if (subview === "detail" && activeInsp) {
    const zone = ZONES.find(z => z.id === activeInsp.zoneId);
    const freq = FREQUENCIES.find(f => f.id === activeInsp.frequency);
    const bien = activeInsp.items.filter(i => i.status === "bien").length;
    const aten = activeInsp.items.filter(i => i.status === "atencion").length;
    const mal  = activeInsp.items.filter(i => i.status === "mal").length;
    const total = activeInsp.items.filter(i => i.status && i.status !== "na").length;
    const score = total > 0 ? Math.round((bien / total) * 100) : 0;

    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
          <button onClick={() => setSubview("home")} style={btnSec(mob)}>← Historial</button>
          <div style={{ flex: 1 }} />
          <button onClick={() => printInspection(activeInsp)} style={btnSec(mob)}>🖨️ PDF</button>
          {confirmDelInsp
            ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{ fontSize: 12, color: "#dc2626", fontWeight: 600 }}>¿Eliminar?</span>
                <button onClick={async () => {
                  if (activeInsp._docId && window.__db) {
                    const { doc, deleteDoc } = window.__fs;
                    await deleteDoc(doc(window.__db, 'inspections', activeInsp._docId));
                  }
                  setInspections(p => p.filter(i => (i._docId || i.id) !== (activeInsp._docId || activeInsp.id)));
                  setConfirmDelInsp(false);
                  setSubview("home");
                }} style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700 }}>Sí</button>
                <button onClick={() => setConfirmDelInsp(false)} style={{ background: "#f1f5f9", color: "#475569", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>No</button>
              </div>
            : <button onClick={() => setConfirmDelInsp(true)} style={{ ...btnSec(mob), color: "#dc2626", borderColor: "#dc2626" }}>🗑️</button>
          }
        </div>

        <div style={{ fontWeight: 700, fontSize: mob ? 16 : 20, marginBottom: 4 }}>{zone.icon} {zone.label}</div>
        <div style={{ fontSize: 12, color: "#64748b", marginBottom: 18 }}>{freq?.label} · {activeInsp.inspector} · {activeInsp.date}</div>

        {/* Score */}
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
          {[
            { label: "Puntaje",           value: score + "%", color: score >= 80 ? "#059669" : score >= 50 ? "#d97706" : "#dc2626" },
            { label: "✅ Bien",           value: bien,        color: "#059669" },
            { label: "⚠️ Requiere atención", value: aten,    color: "#d97706" },
            { label: "❌ Mal estado",     value: mal,         color: "#dc2626" },
          ].map(s => (
            <div key={s.label} style={{ background: "#fff", borderRadius: 9, padding: "14px 16px", textAlign: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: mob ? 24 : 28, fontWeight: 700, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Items */}
        <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          {activeInsp.items.map((item, i) => {
            const st = ITEM_STATUS.find(s => s.id === item.status);
            return (
              <div key={i} style={{ display: "flex", alignItems: mob ? "flex-start" : "center", gap: 14, padding: "12px 16px", borderBottom: "1px solid #f0f4f8", flexDirection: mob ? "column" : "row" }}>
                <div style={{ width: 22, color: "#64748b", fontSize: 12, flexShrink: 0 }}>{i+1}</div>
                <div style={{ flex: 1, fontWeight: 600, fontSize: 13 }}>{item.label}</div>
                {st && <span style={{ background: st.bg, color: st.color, border: `1px solid ${st.color}44`, borderRadius: 20, padding: "3px 11px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", flexShrink: 0 }}>{st.label}</span>}
                {item.note && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic", flexShrink: 0, maxWidth: 220 }}>{item.note}</div>}
              </div>
            );
          })}
        </div>

        {activeInsp.generalNote && (
          <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginTop: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Observación general</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.6 }}>{activeInsp.generalNote}</div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

/* ─── RUNNING CHECKLIST ─── */
function RunningChecklist({ insp, setInsp, onSave, onBack, mob }) {
  const zone = ZONES.find(z => z.id === insp.zoneId);
  const freq = FREQUENCIES.find(f => f.id === insp.frequency);
  const [noteIdx, setNoteIdx] = useState(null);
  const answered = insp.items.filter(i => i.status !== "").length;
  const progress = Math.round((answered / insp.items.length) * 100);

  const setItemStatus = (idx, status) => {
    setInsp(prev => {
      const items = [...prev.items];
      items[idx] = { ...items[idx], status };
      return { ...prev, items };
    });
  };
  const setItemNote = (idx, note) => {
    setInsp(prev => {
      const items = [...prev.items];
      items[idx] = { ...items[idx], note };
      return { ...prev, items };
    });
  };

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <button onClick={onBack} style={btnSec(mob)}>✕ Cancelar</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: mob ? 15 : 18 }}>{zone.icon} {zone.label}</div>
          <div style={{ fontSize: 11, color: "#64748b" }}>{freq?.label} · {insp.date} · {insp.inspector}</div>
        </div>
        <button
          onClick={() => onSave(insp)}
          style={{ ...btnPri(mob), opacity: answered === 0 ? 0.5 : 1 }}
          disabled={answered === 0}>
          💾 Guardar
        </button>
      </div>

      {/* Progress */}
      <div style={{ background: "#fff", borderRadius: 10, padding: "14px 18px", marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 8 }}>
          <span style={{ fontWeight: 600, color: "#475569" }}>Progreso</span>
          <span style={{ color: "#64748b" }}>{answered} / {insp.items.length} ítems</span>
        </div>
        <div style={{ height: 8, background: "#f1f0ec", borderRadius: 4 }}>
          <div style={{ height: "100%", width: `${progress}%`, background: progress === 100 ? "#059669" : "#2563eb", borderRadius: 4, transition: "width 0.3s" }} />
        </div>
      </div>

      {/* Items */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {insp.items.map((item, i) => (
          <div key={i} style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 14px" : "14px 18px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", border: item.status ? `2px solid ${ITEM_STATUS.find(s => s.id === item.status)?.color}44` : "2px solid transparent" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10 }}>
              <span style={{ width: 22, height: 22, background: item.status ? ITEM_STATUS.find(s => s.id === item.status)?.bg : "#f0f4f8", color: item.status ? ITEM_STATUS.find(s => s.id === item.status)?.color : "#64748b", borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{i+1}</span>
              <div style={{ fontWeight: 600, fontSize: mob ? 13 : 14, flex: 1 }}>{item.label}</div>
            </div>

            {/* Status buttons */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {ITEM_STATUS.map(st => (
                <button key={st.id} onClick={() => setItemStatus(i, st.id)}
                  style={{ flex: 1, minWidth: mob ? 60 : 80, background: item.status === st.id ? st.bg : "#f8fafc", border: `1.5px solid ${item.status === st.id ? st.color : "#e2e8f0"}`, color: item.status === st.id ? st.color : "#64748b", borderRadius: 8, padding: mob ? "7px 4px" : "8px 6px", cursor: "pointer", fontWeight: item.status === st.id ? 700 : 400, fontSize: mob ? 10 : 11, fontFamily: "'Inter',sans-serif", transition: "all 0.12s" }}>
                  {st.label}
                </button>
              ))}
            </div>

            {/* Note toggle */}
            {item.status && item.status !== "" && (
              <div style={{ marginTop: 8 }}>
                {noteIdx === i
                  ? <input autoFocus style={{ ...inpStyle, fontSize: 12 }} value={item.note} onChange={e => setItemNote(i, e.target.value)} placeholder="Observación (opcional)..." onBlur={() => setNoteIdx(null)} />
                  : <button onClick={() => setNoteIdx(i)} style={{ background: "transparent", border: "none", color: "#64748b", fontSize: 11, cursor: "pointer", padding: "2px 0" }}>
                      {item.note ? `📝 ${item.note}` : "+ Agregar observación"}
                    </button>
                }
              </div>
            )}
          </div>
        ))}
      </div>

      {/* General note */}
      <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginTop: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <label style={lblStyle}>Observación general de la inspección</label>
        <textarea style={{ ...inpStyle, height: 72, resize: "vertical" }} value={insp.generalNote} onChange={e => setInsp(p => ({ ...p, generalNote: e.target.value }))} placeholder="Notas generales, contexto, condiciones especiales..." />
      </div>

      <button onClick={() => onSave(insp)} style={{ ...btnPri(mob), width: "100%", marginTop: 14, padding: 14, fontSize: 14, justifyContent: "center", display: "flex", alignItems: "center", gap: 8 }} disabled={answered === 0}>
        💾 Guardar Inspección ({answered}/{insp.items.length} completados)
      </button>
    </div>
  );
}

function InspCard({ insp, onSelect, onPrint }) {
  const z    = ZONES.find(x => x.id === insp.zoneId);
  const freq = FREQUENCIES.find(f => f.id === insp.frequency);
  const bien = insp.items.filter(i => i.status === "bien").length;
  const aten = insp.items.filter(i => i.status === "atencion").length;
  const mal  = insp.items.filter(i => i.status === "mal").length;
  const total = insp.items.filter(i => i.status && i.status !== "na").length;
  const score = total > 0 ? Math.round((bien / total) * 100) : 0;
  const scoreColor = score >= 80 ? "#059669" : score >= 50 ? "#d97706" : "#dc2626";

  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${z?.color}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{z?.icon} {z?.label}</div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>{freq?.label} · {insp.date} · {insp.inspector}</div>
        </div>
        <div style={{ fontWeight: 700, fontSize: 22, color: scoreColor }}>{score}%</div>
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 10, fontSize: 12 }}>
        <span style={{ color: "#059669", fontWeight: 600 }}>✅ {bien}</span>
        <span style={{ color: "#d97706", fontWeight: 600 }}>⚠️ {aten}</span>
        <span style={{ color: "#dc2626", fontWeight: 600 }}>❌ {mal}</span>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
        <button onClick={onSelect} style={{ ...btnSec(true), flex: 1, fontSize: 12 }}>Ver detalle</button>
        <button onClick={() => onPrint(insp)} style={{ ...btnSec(true), fontSize: 12 }}>🖨️</button>
      </div>
    </div>
  );
}

  const filtered = vendors.filter(v =>
    (filterCat === "all" || v.category === filterCat) &&

     (v.contact || "").toLowerCase().includes(search.toLowerCase()))

  return (
    <div>

          const count = vendors.filter(v => v.category === c.id).length;
          const active = filterCat === c.id;
          return (
            <button key={c.id} onClick={() => setFilterCat(active ? "all" : c.id)}

          </div>
        : <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
            {filtered.map(v => {
              const c = vcat(v.category);
              const activeJobs = reports.filter(r => r.vendor === v.name && r.status !== "listo").length;
              const doneJobs   = reports.filter(r => r.vendor === v.name && r.status === "listo").length;
              return (
                <div key={v.id} style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderTop: `4px solid ${c.color}`, overflow: "hidden" }}>
                  {/* Header */}
                  <div style={{ padding: "16px 18px 12px", borderBottom: "1px solid #f0f4f8" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>{v.name}</div>
                        <div style={{ marginTop: 5 }}>
                          <span style={{ background: c.color + "18", color: c.color, border: `1px solid ${c.color}33`, borderRadius: 8, padding: "3px 9px", fontSize: 11, fontWeight: 600 }}>
                            {c.icon} {c.label}
                          </span>
                        </div>
                      </div>
                      <span style={{ fontSize: 28, flexShrink: 0 }}>{c.icon}</span>
                    </div>
                  </div>

                  {/* Info */}
                  <div style={{ padding: "12px 18px", display: "flex", flexDirection: "column", gap: 7 }}>
                    {v.contact && <div style={{ fontSize: 13, color: "#475569", display: "flex", alignItems: "center", gap: 6 }}>👤 <span style={{ fontWeight: 600 }}>{v.contact}</span></div>}
                    <div style={{ fontSize: 13, color: "#475569" }}>📞 {v.phone}</div>
                    {v.email && <div style={{ fontSize: 12, color: "#2563eb" }}>✉️ {v.email}</div>}
                    {v.nit && <div style={{ fontSize: 11, color: "#64748b" }}>NIT: {v.nit}</div>}

                  </div>

                  {/* Stats + actions */}
                  <div style={{ padding: "10px 18px 14px", borderTop: "1px solid #f0f4f8", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div>

                      <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>
                        <span style={{ color: activeJobs > 0 ? "#2563eb" : "#64748b", fontWeight: activeJobs > 0 ? 700 : 400 }}>{activeJobs} activo{activeJobs !== 1 ? "s" : ""}</span>
                        {" · "}{doneJobs} completado{doneJobs !== 1 ? "s" : ""}

                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setEditVendor(v)} style={{ background: "transparent", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 11px", cursor: "pointer", fontSize: 12, color: "#475569" }}>✏️ Editar</button>
                      <button onClick={() => { if (window.confirm(`¿Eliminar a ${v.name}?`)) setVendors(p => p.filter(x => x.id !== v.id)); }} style={{ background: "transparent", border: "1px solid #fee2e2", borderRadius: 8, padding: "6px 11px", cursor: "pointer", fontSize: 12, color: "#dc2626" }}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
      }

      {showNew && <VendorModal onClose={() => setShowNew(false)} onSave={v => { setVendors(p => [...p, { ...v, id: Date.now() }]); setShowNew(false); }} mob={mob} />}
      {editVendor && <VendorModal vendor={editVendor} onClose={() => setEditVendor(null)} onSave={updated => { setVendors(p => p.map(x => x.id === updated.id ? updated : x)); setEditVendor(null); }} mob={mob} />}
    </div>
  );
}

/* ─── RESIDENTES VIEW ─── */
function ResidentesView({ residents, setResidents, reports, comprobantes, setComprobantes, showNew, setShowNew, mob }) {
  const [search, setSearch]         = useState("");
  const [filterTipo, setFT]         = useState("all");
  const [filterPiso, setFP]         = useState("all");
  const [editResident, setEdit]     = useState(null);
  const [confirmDel, setConfirm]    = useState(null);
  const [perfilResident, setPerfil] = useState(null);

  if (perfilResident) {
    const updated = residents.find(r => (r._docId || r.id) === (perfilResident._docId || perfilResident.id)) || perfilResident;
    return <ResidentePerfil resident={updated} comprobantes={comprobantes.filter(c => c.apt === updated.apt)} setComprobantes={setComprobantes} reports={reports.filter(r => r.apt === updated.apt)} onBack={() => setPerfil(null)} mob={mob} />;
  }

  const TIPOS = [
    { id: "propietario",   label: "Propietario",   color: "#0f172a", bg: "#f0f4f8", icon: "🏠" },
    { id: "arrendatario",  label: "Arrendatario",  color: "#2563eb", bg: "#eff6ff", icon: "🔑" },
    { id: "familiar",      label: "Familiar",       color: "#7c3aed", bg: "#f5f3ff", icon: "👨‍👩‍👧" },
  ];
  const ESTADOS = [
    { id: "activo",   label: "Activo",   color: "#059669", bg: "#f0fdf4" },
    { id: "inactivo", label: "Inactivo", color: "#9ca3af", bg: "#f9fafb" },
  ];
  const tipoObj  = (id) => TIPOS.find(t => t.id === id)   || TIPOS[0];
  const estadoObj= (id) => ESTADOS.find(e => e.id === id) || ESTADOS[0];

  // Pisos únicos de los apartamentos registrados
  const pisos = [...new Set(residents.map(r => r.piso).filter(Boolean))].sort();

  const filtered = residents.filter(r => {
    const q = search.toLowerCase();
    const matchQ = !q || r.nombre?.toLowerCase().includes(q) || r.apt?.toLowerCase().includes(q) || r.email?.toLowerCase().includes(q) || r.telefono?.toLowerCase().includes(q);
    const matchTipo = filterTipo === "all" || r.tipo === filterTipo;
    const matchPiso = filterPiso === "all" || r.piso === filterPiso;
    return matchQ && matchTipo && matchPiso;
  }).sort((a,b) => (a.apt||"").localeCompare(b.apt||"", undefined, { numeric: true }));

  const repsByApt = (apt) => reports.filter(r => r.apt === apt).length;

  const exportExcel = () => {
    const data = residents.map(r => ({
      "Apartamento": r.apt, "Piso": r.piso, "Nombre": r.nombre,
      "Tipo": tipoObj(r.tipo).label, "Estado": estadoObj(r.estado).label,
      "Teléfono": r.telefono, "Email": r.email,
      "Teléfono 2": r.telefono2 || "", "Vehículo": r.vehiculo || "",
      "Placa": r.placa || "", "Parqueadero": r.parqueadero || "",
      "Mascotas": r.mascotas || "", "Notas": r.notas || "",
      "Fecha ingreso": r.fechaIngreso || "",
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [8,4,24,14,10,14,26,14,14,10,14,16,30,14].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Residentes");
    XLSX.writeFile(wb, `residentes_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const handleSave = async (form) => {
    if (form._docId) {
      setResidents(p => p.map(r => r._docId === form._docId ? form : r));
    } else {
      setResidents(p => [...p, { ...form, id: Date.now() }]);
    }
    setShowNew(false); setEdit(null);
  };

  const handleDelete = async (res) => {
    setResidents(p => p.filter(r => r._docId !== res._docId));
    setConfirm(null);
  };

  const statsActivos  = residents.filter(r => r.estado === "activo").length;
  const statsProps    = residents.filter(r => r.tipo === "propietario").length;
  const statsArren    = residents.filter(r => r.tipo === "arrendatario").length;

  return (
    <div>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total",        value: residents.length, icon: "👥", color: "#0f172a" },
          { label: "Activos",      value: statsActivos,     icon: "✅", color: "#059669" },
          { label: "Propietarios", value: statsProps,       icon: "🏠", color: "#d97706" },
          { label: "Arrendatarios",value: statsArren,       icon: "🔑", color: "#2563eb" },
        ].map(s => (
          <div key={s.label} style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 12px" : "16px 18px", borderLeft: `3px solid ${s.color}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: mob ? 18 : 20 }}>{s.icon}</div>
            <div style={{ fontSize: mob ? 26 : 30, fontWeight: 700, color: s.color, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar nombre, apto, email..." style={{ ...inpStyle, flex: 1, minWidth: 180, maxWidth: 300, marginBottom: 0 }} />
        <select value={filterTipo} onChange={e => setFT(e.target.value)} style={selStyle}>
          <option value="all">Todos los tipos</option>
          {TIPOS.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
        </select>
        {pisos.length > 0 && (
          <select value={filterPiso} onChange={e => setFP(e.target.value)} style={selStyle}>
            <option value="all">Todos los pisos</option>
            {pisos.map(p => <option key={p} value={p}>Piso {p}</option>)}
          </select>
        )}
        <button onClick={exportExcel} style={btnSec(mob)}>📥 Excel</button>
        <div style={{ color: "#64748b", fontSize: 12, marginLeft: "auto" }}>{filtered.length} residente{filtered.length !== 1 ? "s" : ""}</div>
      </div>

      {mob ? (
        /* MOBILE: Cards */
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.length === 0 && <div style={{ textAlign: "center", color: "#64748b", padding: 40 }}>Sin residentes registrados</div>}
          {filtered.map(r => {
            const t = tipoObj(r.tipo); const e = estadoObj(r.estado);
            return (
              <div key={r._docId || r.id} style={{ background: "#fff", borderRadius: 10, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${t.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>Apto {r.apt}</div>
                    <div style={{ fontSize: 13, color: "#0f172a", marginTop: 2 }}>{r.nombre}</div>
                  </div>
                  <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}55`, borderRadius: 20, padding: "3px 10px", fontSize: 10, fontWeight: 700 }}>{e.label}</span>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  <span style={{ background: t.bg, color: t.color, border: `1px solid ${t.color}33`, borderRadius: 8, padding: "3px 8px", fontSize: 11, fontWeight: 600 }}>{t.icon} {t.label}</span>
                  {repsByApt(r.apt) > 0 && <span style={{ background: "#f8fafc", color: "#d97706", border: "1px solid #d9770633", borderRadius: 8, padding: "3px 8px", fontSize: 11 }}>📋 {repsByApt(r.apt)} reporte{repsByApt(r.apt) > 1 ? "s" : ""}</span>}
                </div>
                {r.telefono && <div style={{ fontSize: 12, color: "#64748b", marginTop: 6 }}>📞 {r.telefono}</div>}
                {r.email    && <div style={{ fontSize: 12, color: "#2563eb", marginTop: 2 }}>✉️ {r.email}</div>}
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button onClick={() => setPerfil(r)} style={{ ...btnPri(mob), flex: 1, textAlign: "center", background: "#059669" }}>👁️ Ver perfil</button>
                  <button onClick={() => setEdit(r)} style={{ ...btnSec(mob) }}>✏️</button>
                  <button onClick={() => setConfirm(r)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        /* DESKTOP: Table */
        <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }}>
                {["Apto","Piso","Nombre","Tipo","Teléfono","Email","Vehículo/Placa","Estado","Reportes",""].map(h => (
                  <th key={h} style={{ padding: "11px 13px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && <tr><td colSpan={10} style={{ textAlign: "center", padding: 40, color: "#64748b", fontSize: 13 }}>Sin residentes registrados. Haz clic en "+ Residente" para agregar.</td></tr>}
              {filtered.map(r => {
                const t = tipoObj(r.tipo); const e = estadoObj(r.estado);
                const nReps = repsByApt(r.apt);
                return (
                  <tr key={r._docId || r.id} style={{ borderBottom: "1px solid #f0f4f8" }}

                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => setPerfil(r)} style={{ background: "#f0fdf4", border: "1px solid #05966933", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#059669", fontFamily: "'Inter',sans-serif" }}>👁️</button>
                        <button onClick={() => setEdit(r)} style={{ background: "#f0f4f8", border: "1px solid #e2e8f0", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#475569", fontFamily: "'Inter',sans-serif" }}>✏️</button>
                        <button onClick={() => setConfirm(r)} style={{ background: "#fef2f2", border: "1px solid #dc262633", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#dc2626", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Modals */}
      {(showNew || editResident) && (
        <ResidenteModal
          resident={editResident}
          residents={residents}
          onClose={() => { setShowNew(false); setEdit(null); }}
          onSave={handleSave}
          mob={mob}
        />
      )}
      {confirmDel && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 14, padding: 28, maxWidth: 380, width: "100%", boxShadow: "0 24px 60px rgba(0,0,0,0.25)" }}>
            <div style={{ fontSize: 36, textAlign: "center", marginBottom: 12 }}>🗑️</div>
            <div style={{ fontWeight: 700, fontSize: 16, textAlign: "center", marginBottom: 8 }}>¿Eliminar residente?</div>
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", marginBottom: 20 }}>Se eliminará a <strong>{confirmDel.nombre}</strong> (Apto {confirmDel.apt}). Esta acción no se puede deshacer.</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirm(null)} style={{ ...btnSec(mob), flex: 1 }}>Cancelar</button>
              <button onClick={() => handleDelete(confirmDel)} style={{ flex: 1, background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── RESIDENTE MODAL ─── */
function ResidenteModal({ resident, residents = [], onClose, onSave, mob }) {
  const TIPOS = [
    { id: "propietario",  label: "Propietario",  icon: "🏠", color: "#d97706" },
    { id: "arrendatario", label: "Arrendatario", icon: "🔑", color: "#2563eb" },
    { id: "familiar",     label: "Familiar",      icon: "👨‍👩‍👧", color: "#7c3aed" },
  ];
  const [form, setForm] = useState(resident || {
    apt: "", piso: "", nombre: "", tipo: "propietario", estado: "activo",
    tipoApto: "Tipo A", cuota: 504,
    telefono: "", telefono2: "", email: "",
    propietario: "", contacto: "", telefonoProp: "", emailProp: "",
    inquilino: "", telInquilino: "", emailInquilino: "",
    vehiculo: "", placa: "", parqueadero: "",
    mascotas: "", fechaIngreso: new Date().toISOString().slice(0,10), notas: "",
    pin: ""
  });
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const isEdit = !!resident;

  // Al elegir apto: rellena piso, tipoApto, cuota y datos del propietario
  const handleAptChange = (v) => {
    // Primero busca un residente tipo propietario, si no hay, usa cualquier residente del apto
    const propRes = residents.find(r => r.apt === v && r.tipo === "propietario");
    const anyRes  = residents.find(r => r.apt === v);
    const base    = propRes || anyRes;
    setForm(p => ({
      ...p,
      apt:          v,
      piso:         base?.piso         || "",
      tipoApto:     base?.tipoApto     || "",
      cuota:        base?.cuota        || "",
      // Si hay propietario registrado: usar sus datos personales
      // Si no hay (solo arrendatario): usar los campos propietario/* del arrendatario
      propietario:  propRes ? (propRes.propietario || propRes.nombre || "")
                            : (anyRes?.propietario || ""),
      contacto:     propRes ? (propRes.contacto    || propRes.nombre || "")
                            : (anyRes?.contacto    || ""),
      telefonoProp: propRes ? (propRes.telefonoProp || propRes.telefono || "")
                            : (anyRes?.telefonoProp || ""),
      emailProp:    propRes ? (propRes.emailProp    || propRes.email    || "")
                            : (anyRes?.emailProp    || ""),
    }));
  };

  // Al cambiar tipo a arrendatario: re-aplica auto-fill si ya hay apto
  const handleTipoChange = (v) => {
    if (v === "arrendatario" && form.apt) {
      const owner = residents.find(r => r.apt === form.apt && r.tipo === "propietario");
      setForm(p => ({ ...p, tipo: v,
        propietario:  owner?.propietario || owner?.nombre   || "",
        contacto:     owner?.contacto    || owner?.nombre   || "",
        telefonoProp: owner?.telefonoProp|| owner?.telefono || "",
        emailProp:    owner?.emailProp   || owner?.email    || "",
      }));
    } else {
      f("tipo", v);
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16, overflowY: "auto" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: mob ? 20 : 28, width: "100%", maxWidth: 600, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 24px 60px rgba(0,0,0,0.25)", margin: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 18 }}>{isEdit ? "✏️ Editar Residente" : "👥 Nuevo Residente"}</div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 20, cursor: "pointer", color: "#64748b" }}>✕</button>
        </div>

        {/* Tipo */}
        <div style={{ marginBottom: 16 }}>
          <label style={lblStyle}>Tipo de residente</label>
          <div style={{ display: "flex", gap: 8 }}>
            {TIPOS.map(t => {
              const act = form.tipo === t.id;
              return (
                <button key={t.id} onClick={() => handleTipoChange(t.id)} style={{ flex: 1, background: act ? t.color : t.color + "12", color: act ? "#fff" : t.color, border: `2px solid ${act ? t.color : t.color + "44"}`, borderRadius: 9, padding: "10px 6px", cursor: "pointer", fontFamily: "'Inter',sans-serif", fontWeight: 700, fontSize: 12, transition: "all 0.12s" }}>
                  <div style={{ fontSize: 20, marginBottom: 4 }}>{t.icon}</div>{t.label}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 12 }}>
          {/* Apartamento — dropdown con aptos existentes */}
          <div style={{ gridColumn: mob ? "1" : "1 / -1" }}>
            <label style={lblStyle}>Apartamento *</label>
            <select
              value={form.apt}
              onChange={e => handleAptChange(e.target.value)}
              style={{ ...selStyle, width: "100%", color: form.apt ? "#1e293b" : "#94a3b8" }}>
              <option value="">Selecciona un apartamento</option>
              {[...new Set(residents.map(r => r.apt).filter(Boolean))]
                .sort((a,b) => a.localeCompare(b, undefined, { numeric: true }))
                .map(apt => <option key={apt} value={apt}>{apt}</option>)
              }
            </select>
          </div>
          <div style={{ gridColumn: mob ? "1" : "1 / -1" }}>
            <FInp label="Nombre completo *" editing value={form.nombre} onChange={v => f("nombre", v)} placeholder="Nombre del residente principal" />
          </div>

          <FInp label="Teléfono principal" editing value={form.telefono}  onChange={v => f("telefono", v)}  placeholder="Ej: 6000-0000" />
          <FInp label="Teléfono alternativo" editing value={form.telefono2} onChange={v => f("telefono2", v)} placeholder="Opcional" />
          <div style={{ gridColumn: mob ? "1" : "1 / -1" }}>
            <FInp label="Correo electrónico" editing value={form.email} onChange={v => f("email", v)} placeholder="correo@ejemplo.com" />
          </div>

          {/* Datos del propietario — congelados, leídos del form state */}
          {form.apt && (
            <div style={{ gridColumn: mob ? "1" : "1 / -1", background: "#fefce8", border: "1px solid #fde68a", borderRadius: 10, padding: "14px 16px", marginTop: 4 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#92400e", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>🏠 Propietario del apartamento</div>
              <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 10 }}>
                {[
                  { label: "Nombre / Razón Social", value: form.propietario },
                  { label: "Persona de contacto",   value: form.contacto },
                  { label: "Teléfono",               value: form.telefonoProp },
                  { label: "Email",                  value: form.emailProp },
                ].map(d => (
                  <div key={d.label}>
                    <div style={{ fontSize: 10, color: "#92400e", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{d.label}</div>
                    <div style={{ fontSize: 13, color: d.value ? "#1e293b" : "#94a3b8", fontStyle: d.value ? "normal" : "italic", background: "#fff", borderRadius: 7, padding: "8px 10px", border: "1px solid #fde68a" }}>
                      {d.value || "Sin datos"}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Separador */}
          <div style={{ gridColumn: mob ? "1" : "1 / -1", borderTop: "1px solid #f1f5f9", paddingTop: 12, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>🚗 Vehículo y Parqueadero</div>
          </div>
          <FInp label="Vehículo (marca/modelo)" editing value={form.vehiculo}     onChange={v => f("vehiculo", v)}     placeholder="Ej: Toyota Corolla" />
          <FInp label="Placa"                   editing value={form.placa}        onChange={v => f("placa", v)}        placeholder="Ej: ABC-123" />
          <FInp label="Nro. Parqueadero"        editing value={form.parqueadero}  onChange={v => f("parqueadero", v)}  placeholder="Ej: P-15" />

          {/* Separador */}
          <div style={{ gridColumn: mob ? "1" : "1 / -1", borderTop: "1px solid #f1f5f9", paddingTop: 12, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>📋 Datos adicionales</div>
          </div>
          <FInp label="Mascotas"       editing value={form.mascotas}     onChange={v => f("mascotas", v)}     placeholder="Ej: Perro pequeño, Gato" />
          <FInp label="Fecha de ingreso" editing value={form.fechaIngreso} onChange={v => f("fechaIngreso", v)} type="date" />
          <div style={{ gridColumn: mob ? "1" : "1 / -1" }}>
            <FTxt label="Notas / Observaciones" editing value={form.notas} onChange={v => f("notas", v)} placeholder="Información adicional, contacto de emergencia, acuerdos especiales..." />
          </div>

          {/* Estado */}
          <div style={{ gridColumn: mob ? "1" : "1 / -1" }}>
            <label style={lblStyle}>Estado</label>
            <div style={{ display: "flex", gap: 10 }}>
              {[{id:"activo",label:"✅ Activo",color:"#059669"},{id:"inactivo",label:"⏸️ Inactivo",color:"#9ca3af"}].map(e => {
                const act = form.estado === e.id;
                return <button key={e.id} onClick={() => f("estado", e.id)} style={{ background: act ? e.color + "22" : "#f9fafb", color: act ? e.color : "#9ca3af", border: `2px solid ${act ? e.color : "#e5e7eb"}`, borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontWeight: 700, fontSize: 12, fontFamily: "'Inter',sans-serif" }}>{e.label}</button>;
              })}
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 22, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={btnSec(mob)}>Cancelar</button>
          <button onClick={() => {
            if (!form.apt || !form.nombre) { alert("Selecciona un apartamento e ingresa el nombre"); return; }
            onSave(form);
          }} style={btnPri(mob)}>
            {isEdit ? "💾 Guardar cambios" : "✅ Agregar residente"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── VOTACIONES VIEW ─── */
function VotacionesView({ votes, setVotes, residents, user, mob }) {
  const [showNew, setShowNew]   = useState(false);
  const [selected, setSelected] = useState(null);

  const activeVotes   = votes.filter(v => v.estado === "activa");
  const closedVotes   = votes.filter(v => v.estado === "cerrada");

  const handleCreate = (form) => {
    setVotes(p => [...p, { ...form, id: Date.now(), creadoPor: user.name, fechaCreacion: new Date().toISOString().slice(0,10), estado: "activa", respuestas: [] }]);
    setShowNew(false);
  };

  const [confirmDelVoto, setConfirmDelVoto] = useState(null);
  const [sendingWA, setSendingWA] = useState(null);
  const [sendResult, setSendResult] = useState(null);

  const handleSendWA = async (voto) => {
    const id = voto._docId || voto.id;
    setSendingWA(id);
    setSendResult(null);
    try {
      const res = await fetch('/dev/null', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          voteId: voto._docId,
          titulo: voto.titulo,
          tipo: voto.tipo,
          opciones: voto.opciones,
          pregunta: voto.descripcion
        })
      });
      const data = await res.json();
      setSendResult({ id, ok: data.ok, enviados: data.enviados, total: data.total });
    } catch (e) {
      setSendResult({ id, ok: false, error: e.message });
    }
    setSendingWA(null);
  };

  const handleClose = (voto) => {
    const id = voto._docId || voto.id;
    setVotes(p => p.map(v => (v._docId || v.id) === id ? { ...v, estado: "cerrada", fechaCierre: new Date().toISOString().slice(0,10) } : v));
    setSelected(null);
  };

  const handleDelete = (voto) => {
    const id = voto._docId || voto.id;
    setVotes(p => p.filter(v => (v._docId || v.id) !== id));
    if ((selected?._docId || selected?.id) === id) setSelected(null);
    setConfirmDelVoto(null);
  };

  // Obtener votos actualizados del estado
  const getVoto = (id) => votes.find(v => v._docId === id || v.id === id);

  if (selected) {
    const votoActual = getVoto(selected._docId || selected.id) || selected;
    return <VotacionDetail voto={votoActual} residents={residents} onBack={() => setSelected(null)} onClose={() => handleClose(votoActual)} onDelete={() => handleDelete(votoActual)} setVotes={setVotes} user={user} mob={mob} />;
  }

  return (
    <div>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total votaciones", value: votes.length,         icon: "🗳️", color: "#0f172a" },
          { label: "Activas",          value: activeVotes.length,   icon: "🟢", color: "#059669" },
          { label: "Cerradas",         value: closedVotes.length,   icon: "🔒", color: "#9ca3af" },
        ].map(s => (
          <div key={s.label} style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 12px" : "16px 18px", borderLeft: `3px solid ${s.color}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: mob ? 18 : 20 }}>{s.icon}</div>
            <div style={{ fontSize: mob ? 26 : 30, fontWeight: 700, color: s.color, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
        <button onClick={() => setShowNew(true)} style={btnPri(mob)}>🗳️ Nueva Votación</button>
      </div>

      {/* Activas */}
      {activeVotes.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#059669", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>● Votaciones Activas</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
